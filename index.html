function DetailView({ ticker, port, snapshots, alerts, eurusd, onBack }) {
  const p = port.find(x => x.t === ticker); if (!p) return null;
  const a = AN[ticker] || {};
  const [history, setHistory] = useState(null);
  const [qHist, setQHist] = useState(null); // historique trimestriel 3A
  const [spyQHist, setSpyQHist] = useState(null); // SPY trimestriel pour beta
  const [earnDate, setEarnDate] = useState(undefined); // undefined=chargement, null=aucune, {ts,date}=ok
  const [horizon, setHorizon] = useState(12);
  const [reviewBump, setReviewBump] = useState(0);
  const [cInfo, setCInfo] = useState(false);

  useEffect(() => {
    snapshotsRange(Date.now() - 90*86400000).then(arr => {
      const series = arr.map(s => {
        const pos = (s.port || []).find(x => x.t === ticker);
        return pos ? { ts: s.ts, date: new Date(s.ts).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}), px: pos.pxE } : null;
      }).filter(Boolean);
      setHistory(series);
    });
  }, [ticker]);

  useEffect(() => {
    const sym = YF[ticker] ? (typeof YF[ticker]==="string" ? YF[ticker] : (YF[ticker].y||ticker)) : ticker;
    fetchQuarterlyHistory(sym).then(setQHist);
    fetchQuarterlyHistory("SPY").then(setSpyQHist);
    setEarnDate(undefined);
    fetchEarningsDate(sym).then(setEarnDate);
  }, [ticker]);

  const f = forecast(p, MACRO);
  const al = alerts[ticker];
  const dynConv = useMemo(() => calcDynamicConviction(ticker, p, snapshots, qHist), [ticker, p.pxE, qHist, snapshots, reviewBump]);
  const ec = dynConv.value;

  // RSI depuis snapshots 90j
  const rsi = useMemo(() => {
    if(!history||history.length<16) return null;
    return calcRSI(history.map(h=>h.px).filter(x=>x!=null));
  }, [history]);

  // Beta réel vs SPY (trimestriel 3A)
  const beta = useMemo(() => {
    if(!qHist||!spyQHist||qHist.length<5||spyQHist.length<5) return null;
    return calcBeta(qHist.map(d=>d.px), spyQHist.map(d=>d.px));
  }, [qHist, spyQHist]);

  // Kelly sizing
  const kellyPct = useMemo(() => {
    if(!history) return null;
    return calcKelly(ec, f.p50, history.length);
  }, [history, ec, f.p50]);

  // Score de risque synthétique
  const risk = useMemo(() => calcRiskScore({ vol:p.v, rsi, beta, wt:p.wt, p10:f.p10, ec }), [p.v, rsi, beta, p.wt, f.p10, ec]);

  // Verdict synthétique : signal + conviction + risque combinés en une phrase
  const verdict = useMemo(() => {
    const vsig = p.effSig || p.sig;   // signal réactif au prix (pas la vue analyste figée)
    const sigLabel = {buy:"RENFORCER", sell:"ALLÉGER", hold:"CONSERVER", spec:"SPÉCULATIF"}[vsig] || "CONSERVER";
    const riskLabel = risk.total>=65?"risque élevé":risk.total>=40?"risque modéré":"risque faible";
    const convLabel = ec>=80?"conviction forte":ec>=60?"conviction correcte":"conviction faible";
    let phrase;
    if(vsig==="sell" && risk.total>=55) phrase = `Signal de vente avec ${riskLabel} actuel — fenêtre de sortie favorable.`;
    else if(vsig==="buy" && risk.total<45) phrase = `Opportunité de renforcement à ${riskLabel} — ${convLabel} de la thèse.`;
    else if(vsig==="buy" && risk.total>=55) phrase = `Thèse positive mais ${riskLabel} actuel — renforcer prudemment ou attendre.`;
    else if(vsig==="sell" && risk.total<45) phrase = `Signal de vente mais risque actuel limité — pas d'urgence à agir.`;
    else phrase = `Position stable, ${riskLabel}, ${convLabel}.`;
    return { sigLabel, riskLabel, convLabel, phrase };
  }, [p.sig, p.effSig, p.pxE, risk.total, ec]);

  // Fiscal (PEA exonéré imposition revenu, CTO = PFU 30%)
  const fiscal = useMemo(() => {
    if(!p.pnl||p.pnl<=0) return null;
    const acct = p.acct || "CTO";
    const tax = acct==="CTO" ? p.pnl*0.30 : p.pnl*0.172; // CTO=30%, PEA=17.2% PS uniquement
    return {acct, tax, net:p.pnl-tax, taxPct:acct==="CTO"?30:17.2};
  }, [p.pnl, p.acct]);
  // Tout normalisé en % par rapport au cours actuel (0% = prix d'aujourd'hui)
  const chartData = useMemo(() => {
    const yfSym = YF[ticker] ? (typeof YF[ticker]==="string" ? YF[ticker] : (YF[ticker].y||ticker)) : ticker;
    const isEUR = yfSym.endsWith(".PA");
    const baseEUR = p.pxE || 1;
    const baseNative = isEUR ? baseEUR : baseEUR * (eurusd || 1.174); // prix actuel en devise native
    const normNative = (px) => baseNative > 0 ? +((px-baseNative)/baseNative*100).toFixed(2) : null;
    const normEUR    = (px) => baseEUR    > 0 ? +((px-baseEUR   )/baseEUR   *100).toFixed(2) : null;

    // 1. Trimestriel 3A (devise native Yahoo Finance → % vs aujourd'hui)
    const fx = isEUR ? 1 : (eurusd || 1.174);
    const histPts = (qHist||[]).map(d=>({
      date:d.date, seg:"hist",
      pxHist:normNative(d.px), px:null, p10:null, p50:null, p90:null,
      eur: +(d.px / fx).toFixed(2)   // prix réel en € (natif ÷ taux)
    }));

    // 2. Snapshots 90j (EUR → % vs cours actuel EUR)
    const recentPts = (history||[]).map(d=>({
      date:d.date, seg:"recent",
      pxHist:null, px:normEUR(d.px), p10:null, p50:null, p90:null,
      eur: +d.px.toFixed(2)
    }));

    // 3. Transition : aujourd'hui = 0% (départ du cône)
    const lastDate = history&&history.length>0 ? history[history.length-1].date : "Auj.";
    const trans = {date:lastDate, seg:"trans", pxHist:null, px:0, p10:0, p50:0, p90:0, coneBase:0, coneSpan:0, eur:+baseEUR.toFixed(2)};

    // 4. Côté passé = historique 3A + snapshots 90j, rééchantillonné pour occuper 3/4 de la largeur
    const snap = recentPts.length>0 ? recentPts.slice(0,-1) : [];
    const past = [...histPts, ...snap];
    // Rééchantillonnage régulier en gardant début et fin (courbe lisse, sans écraser la prévision)
    const downsample = (arr, n) => {
      if(arr.length <= n) return arr;
      const step = (arr.length-1)/(n-1), out = [];
      for(let i=0;i<n;i++) out.push(arr[Math.round(i*step)]);
      return out;
    };
    const TARGET_PAST = 45;
    const pastDS = downsample(past, TARGET_PAST);

    // 5. Prévisions — nombre de points calé sur 1/4 de la largeur (ratio 3:1), étalées sur l'horizon
    const Fn = Math.max(6, Math.round(pastDS.length/3));
    const fPts = Array.from({length:Fn}, (_,i) => {
      const mo = horizon*(i+1)/Fn;               // mois fractionnaires jusqu'à l'horizon
      const p10 = +(f.p10*mo/12*100).toFixed(2);
      const p90 = +(f.p90*mo/12*100).toFixed(2);
      const p50 = +(f.p50*mo/12*100).toFixed(2);
      return {
        date:`+${Number.isInteger(mo)?mo:mo.toFixed(1)}M`, seg:"forecast", pxHist:null, px:null,
        p10, p90, p50,
        coneBase:p10, coneSpan:+(p90-p10).toFixed(2),  // bande ombrée P10→P90
        // Prix projetés réels en € (pour l'infobulle)
        eur10:+(baseEUR*(1+p10/100)).toFixed(2),
        eur50:+(baseEUR*(1+p50/100)).toFixed(2),
        eur90:+(baseEUR*(1+p90/100)).toFixed(2)
      };
    });

    if(!pastDS.length) return [trans,...fPts];
    return [...pastDS,trans,...fPts];
  }, [qHist, history, p.pxE, eurusd, ticker, f.p10, f.p50, f.p90, horizon]);

  const hcol = risk.total>=65?"#e85d5d":risk.total>=40?"#f0a020":"#2ecc8f";
  const sigCol = {buy:"#2ecc8f",sell:"#e85d5d",hold:"#f0a020",spec:"#8b7cf5"}[p.sig]||"#8892a8";
  const fAtH = (k) => f[k]*horizon/12*100; // prévision recalée sur l'horizon sélectionné
  // Bornes de la zone de prévision (pour l'ombrage + le séparateur "aujourd'hui")
  const fcStart = (chartData.find(d=>d.seg==="trans")||{}).date || null;
  const fcEnd = chartData.length ? chartData[chartData.length-1].date : null;

  return (
    <div className="dt-ovr">
      <div className="bk" onClick={onBack}>← Retour</div>

      {/* EN-TÊTE : identité + earnings */}
      <div className="card" style={{marginBottom:9}}>
        <div className="cd-ti">
          <div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:"-.01em"}}>{p.t}</div>
            <div className="dim" style={{fontSize:12}}>{p.n} • {p.s}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <span className={"chip "+(p.effSig||p.sig)} style={{fontSize:11,padding:"4px 10px"}}>{p.effSig||p.sig}</span>
            {p.effDrift && <div style={{fontSize:8,color:"#8b7cf5",marginTop:3}} title={p.effReason}>analyste : {p.effBase} ↻</div>}
          </div>
        </div>
        {p.effDrift && (
          <div style={{fontSize:10,color:"#8b7cf5",background:"rgba(139,124,245,.08)",borderRadius:6,padding:"6px 9px",marginBottom:8}}>
            Verdict ajusté au prix : <strong>{p.effReason}</strong>. La vue analyste de fond reste « {p.effBase} ».
          </div>
        )}
        {earnDate !== undefined && (
          <div style={{marginTop:6,display:"inline-flex",alignItems:"center",gap:5,fontSize:10,
            background:earnDate?"rgba(240,160,32,.1)":"transparent",
            border:earnDate?"1px solid rgba(240,160,32,.25)":"none",
            borderRadius:5,padding:earnDate?"3px 9px":0,color:earnDate?"#f0a020":"#3a4560"}}>
            {earnDate ? <>📅 Résultats : <strong>{earnDate.date}</strong></> : "Pas de date de résultats connue"}
          </div>
        )}
      </div>

      {/* VERDICT — synthèse décisionnelle en un coup d'œil */}
      <div className="card" style={{marginBottom:9,border:"1px solid "+sigCol+"40",background:`linear-gradient(135deg, ${sigCol}14, transparent)`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
          <div style={{flex:1}}>
            <div style={{fontSize:9,color:"#3a4560",fontWeight:800,letterSpacing:".08em",marginBottom:4}}>VERDICT</div>
            <div style={{fontSize:20,fontWeight:800,color:sigCol,marginBottom:6}}>{verdict.sigLabel}</div>
            <div style={{fontSize:12,color:"#dde3f0",lineHeight:1.5}}>{verdict.phrase}</div>
          </div>
          <div style={{textAlign:"center",flex:"0 0 auto"}}>
            <div style={{position:"relative",width:64,height:64}}>
              <svg viewBox="0 0 64 64" width="64" height="64">
                <circle cx="32" cy="32" r="26" fill="none" stroke="#161c2a" strokeWidth="6"/>
                <circle cx="32" cy="32" r="26" fill="none" stroke={hcol} strokeWidth="6"
                  strokeLinecap="round" strokeDasharray={2*Math.PI*26}
                  strokeDashoffset={2*Math.PI*26*(1-risk.total/100)}
                  transform="rotate(-90 32 32)"/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:hcol,fontFamily:"monospace"}}>{risk.total}</div>
            </div>
            <div style={{fontSize:8,color:"#3a4560",fontWeight:700,letterSpacing:".05em",marginTop:4}}>RISQUE /100</div>
          </div>
        </div>
        <div className="g3" style={{marginTop:12,paddingTop:10,borderTop:"1px solid rgba(255,255,255,.06)"}}>
          <div><div className="lbl">Conviction</div><div className="mono" style={{fontSize:14,color:"#2ecc8f"}}>{ec}/100</div></div>
          <div><div className="lbl">Cours / PRU</div><div className="mono" style={{fontSize:14,color:cl(p.pct)}}>{fp(p.pct)}</div></div>
          <div><div className="lbl">Poids portef.</div><div className="mono" style={{fontSize:14}}>{fp(p.wt,1)}</div></div>
        </div>
      </div>

      <div className="card">
        <div className="g2">
          <div><div className="lbl">Cours actuel</div><div className="mono" style={{fontSize:16}}>{fe(p.pxE)}</div></div>
          <div><div className="lbl">PRU</div><div className="mono" style={{fontSize:16}}>{fe(p.b)}</div></div>
          <div><div className="lbl">Quantité</div><div className="mono">{p.q.toLocaleString("fr-FR",{maximumFractionDigits:6})}</div></div>
          <div><div className="lbl">Valeur</div><div className="mono" style={{fontSize:16}}>{fe(p.val)}</div></div>
          <div><div className="lbl">P&amp;L</div><div className="mono" style={{fontSize:16,color:cl(p.pnl)}}>{fe(p.pnl)}</div></div>
          <div><div className="lbl">Performance</div><div className="mono" style={{fontSize:16,color:cl(p.pct)}}>{fp(p.pct)}</div></div>
        </div>
      </div>

      {al && al.on && (
        <div className="card">
          <div className="cd-ti"><h3>Seuils actifs</h3></div>
          <div className="g2">
            <div><div className="lbl">Stop bas</div><div className="mono" style={{color:p.pxE&&p.pxE<=al.lo*1.05?"#e85d5d":"#dde3f0"}}>{fe(al.lo)}</div></div>
            <div><div className="lbl">Profit haut</div><div className="mono" style={{color:p.pxE&&p.pxE>=al.hi*0.95?"#2ecc8f":"#dde3f0"}}>{fe(al.hi)}</div></div>
          </div>
        </div>
      )}

      {chartData.length > 0 && (
        <div className="card">
          <div className="cd-ti">
            <h3>Historique &amp; prévisions</h3>
            <span className="dim" style={{fontSize:9}}>👆 clique la courbe → prix</span>
          </div>
          <div className="seg" style={{marginBottom:8}}>
            {[3,6,9,12].map(hz=>
              <div key={hz} className={"it"+(horizon===hz?" ac":"")} onClick={()=>setHorizon(hz)}>{hz}M</div>
            )}
          </div>
          <div style={{fontSize:9,color:"#8892a8",marginBottom:6,display:"flex",alignItems:"center",gap:4}}>
            <span style={{display:"inline-block",width:24,height:2,background:"rgba(255,255,255,.2)",flex:"0 0 auto"}}/>
            <span>← 3/4 passé (3 ans + 90j)</span>
            <span style={{margin:"0 2px"}}>|</span>
            <span style={{display:"inline-block",width:14,height:8,background:"rgba(79,131,245,.18)",borderRadius:2,flex:"0 0 auto"}}/>
            <span>1/4 prévisions ({horizon}M) →</span>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
            {[["─","#4f83f5","Cours"],["▬","rgba(79,131,245,.2)","Cône P10–P90"],["╌","#4f83f5","P50 médian"],["╌","#2ecc8f","P90 haut"],["╌","#e85d5d","P10 bas"]].map(([sym,col,lbl])=>(
              <span key={lbl} style={{fontSize:9,color:col,display:"flex",alignItems:"center",gap:2}}>
                <span style={{fontFamily:"monospace"}}>{sym}</span>{lbl}
              </span>
            ))}
          </div>
          <div style={{fontSize:9,color:"#3a4560",marginBottom:6,fontStyle:"italic"}}>
            👆 Touche la courbe pour afficher le prix à cette date (et les prix projetés dans la zone de prévision).
          </div>
          <div style={{height:230}}>
            <ResponsiveContainer>
              <ComposedChart data={chartData} margin={{top:5,right:46,left:0,bottom:0}}>
                <CartesianGrid stroke="rgba(255,255,255,.04)" vertical={false}/>
                <XAxis dataKey="date" stroke="#3a4560" fontSize={8} tickLine={false} interval="preserveStartEnd" minTickGap={40}/>
                <YAxis stroke="#3a4560" fontSize={9} tickLine={false} axisLine={false}
                  tickFormatter={v=>v!=null?(v>=0?"+":"")+v.toFixed(0)+"%":""} width={46}/>
                <Tooltip
                  trigger="click"
                  wrapperStyle={{outline:"none"}}
                  content={({active, payload}) => {
                    if(!active || !payload || !payload.length) return null;
                    const d = payload[0].payload;
                    if(!d) return null;
                    const box = {background:"#0f1420",border:"1px solid rgba(255,255,255,.14)",borderRadius:8,padding:"9px 11px",boxShadow:"0 4px 14px rgba(0,0,0,.5)"};
                    if(d.seg === "forecast") {
                      return (
                        <div style={box}>
                          <div style={{fontSize:10,color:"#8892a8",marginBottom:5}}>Prévision {d.date}</div>
                          {[["P90",d.eur90,d.p90,"#2ecc8f"],["P50",d.eur50,d.p50,"#4f83f5"],["P10",d.eur10,d.p10,"#e85d5d"]].map(([l,e,pc,c])=>(
                            <div key={l} style={{display:"flex",justifyContent:"space-between",gap:12,fontSize:11,marginBottom:2}}>
                              <span style={{color:c}}>{l}</span>
                              <span className="mono"><strong style={{color:c}}>{e!=null?e.toFixed(2)+" €":"—"}</strong>
                                <span style={{color:"#8892a8",marginLeft:5}}>({pc>=0?"+":""}{pc!=null?pc.toFixed(1):"—"}%)</span>
                              </span>
                            </div>
                          ))}
                        </div>
                      );
                    }
                    const pc = d.px!=null ? d.px : d.pxHist;
                    return (
                      <div style={box}>
                        <div style={{fontSize:10,color:"#8892a8",marginBottom:3}}>{d.date}{d.seg==="trans"?" · aujourd'hui":""}</div>
                        <div className="mono" style={{fontSize:16,fontWeight:800,color:"#dde3f0"}}>
                          {d.eur!=null ? d.eur.toFixed(2)+" €" : "—"}
                        </div>
                        {pc!=null && <div style={{fontSize:10,color:pc>=0?"#2ecc8f":"#e85d5d",marginTop:2}}>
                          {pc>=0?"+":""}{pc.toFixed(1)}% vs aujourd'hui
                        </div>}
                      </div>
                    );
                  }}/>
                {/* Zone de prévision (1/4 droite) ombrée pour séparer nettement passé et futur */}
                {fcStart && <ReferenceArea x1={fcStart} x2={fcEnd} fill="rgba(79,131,245,.06)" stroke="none"
                  label={{value:"PRÉVISIONS", fill:"#3a4560", fontSize:8, position:"insideTop"}}/>}
                <ReferenceLine y={0} stroke="rgba(255,255,255,.2)" strokeWidth={1.5} label={{value:"auj.",fill:"#8892a8",fontSize:8,position:"right"}}/>
                {p.pxE > 0 && <ReferenceLine y={+((p.b-p.pxE)/p.pxE*100).toFixed(2)}
                  stroke="#8892a8" strokeDasharray="3 3"
                  label={{value:"PRU",fill:"#8892a8",fontSize:8,position:"insideTopLeft"}}/>}
                {/* Séparateur vertical AUJOURD'HUI — renforcé */}
                {fcStart && <ReferenceLine x={fcStart} stroke="rgba(255,255,255,.28)" strokeWidth={1.5}
                  label={{value:"aujourd'hui", fill:"#8892a8", fontSize:8, position:"insideTopRight", angle:-90, offset:12}}/>}
                {/* Bande ombrée du cône P10→P90 (empilement : base transparente + envergure colorée) */}
                <Area type="monotone" dataKey="coneBase" stackId="cone" stroke="none" fill="transparent" isAnimationActive={false} connectNulls={false}/>
                <Area type="monotone" dataKey="coneSpan" stackId="cone" stroke="none" fill="rgba(79,131,245,.2)" isAnimationActive={false} connectNulls={false}/>
                <Line type="monotone" dataKey="pxHist" stroke="#4f83f5" strokeWidth={1.5} dot={false} connectNulls={false} strokeOpacity={0.5}/>
                <Line type="monotone" dataKey="px"     stroke="#4f83f5" strokeWidth={2.5} dot={false} connectNulls={false}/>
                <Line type="monotone" dataKey="p50"    stroke="#4f83f5" strokeWidth={1.5} dot={false} connectNulls={false} strokeDasharray="5 3" strokeOpacity={0.85}/>
                <Line type="monotone" dataKey="p90"    stroke="#2ecc8f" strokeWidth={1.5} dot={false} connectNulls={false} strokeDasharray="5 3"/>
                <Line type="monotone" dataKey="p10"    stroke="#e85d5d" strokeWidth={1.5} dot={false} connectNulls={false} strokeDasharray="5 3"/>
                {/* Valeurs P10/P50/P90 chiffrées à la pointe du cône */}
                {fcEnd && <ReferenceDot x={fcEnd} y={fAtH("p90")} r={2.5} fill="#2ecc8f" stroke="none"
                  label={{value:"P90 "+fp(fAtH("p90"),0), fill:"#2ecc8f", fontSize:8, position:"right"}}/>}
                {fcEnd && <ReferenceDot x={fcEnd} y={fAtH("p50")} r={2.5} fill="#4f83f5" stroke="none"
                  label={{value:"P50 "+fp(fAtH("p50"),0), fill:"#4f83f5", fontSize:8, position:"right"}}/>}
                {fcEnd && <ReferenceDot x={fcEnd} y={fAtH("p10")} r={2.5} fill="#e85d5d" stroke="none"
                  label={{value:"P10 "+fp(fAtH("p10"),0), fill:"#e85d5d", fontSize:8, position:"right"}}/>}
              </ComposedChart>
            </ResponsiveContainer>
          </div>
          <div style={{display:"flex",justifyContent:"space-around",fontSize:9,marginTop:4,color:"#8892a8"}}>
            {qHist && qHist.length > 0 && (
              <span>3A: <strong style={{color:qHist[qHist.length-1].px > qHist[0].px ? "#2ecc8f" : "#e85d5d"}}>
                {fp((qHist[qHist.length-1].px/qHist[0].px-1)*100,0)}
              </strong></span>
            )}
            <span>P10 {horizon}M: <strong style={{color:"#e85d5d"}}>{fp(fAtH("p10"),0)}</strong></span>
            <span>P50 {horizon}M: <strong style={{color:"#4f83f5"}}>{fp(fAtH("p50"),0)}</strong></span>
            <span>P90 {horizon}M: <strong style={{color:"#2ecc8f"}}>{fp(fAtH("p90"),0)}</strong></span>
          </div>
        </div>
      )}

      {/* SCORE DE RISQUE — décomposition */}
      <div className="card">
        <div className="cd-ti"><h3>Décomposition du risque</h3><span className="dim" style={{fontSize:9}}>{risk.total}/100</span></div>
        {risk.parts.map(pt=>{
          const pct = pt.score/pt.max;
          const col = pct>=0.7?"#e85d5d":pct>=0.4?"#f0a020":"#2ecc8f";
          return (
            <div key={pt.k} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                <span style={{color:"#8892a8"}}>{pt.label}</span>
                <span className="mono" style={{color:col,fontWeight:700}}>
                  {pt.k==="vol"?(pt.val!=null?pt.val+"%":"—"):
                   pt.k==="rsi"?(pt.val!=null?pt.val:"n/d"):
                   pt.k==="beta"?(pt.val!=null?pt.val.toFixed(2):"n/d"):
                   pt.k==="conc"?(pt.val!=null?pt.val.toFixed(0)+"%":"—"):
                   (pt.val!=null?fp(pt.val*100,0):"—")}
                </span>
              </div>
              <div className="bar"><span style={{width:(pt.score/pt.max*100)+"%",background:col}}/></div>
            </div>
          );
        })}
        <div className="dim" style={{fontSize:9,marginTop:6,fontStyle:"italic"}}>RSI et Beta nécessitent respectivement 15+ et 5+ points de données historiques.</div>
      </div>

      {/* RSI + BETA + KELLY + CONVICTION DECAY */}
      <div className="card">
        <div className="cd-ti"><h3>Indicateurs de marché</h3></div>
        <div className="g2" style={{marginBottom:10}}>
          {/* RSI */}
          {rsi!=null ? (
            <div>
              <div className="lbl">RSI 14</div>
              <div style={{position:"relative",height:22,background:"#161c2a",borderRadius:4,overflow:"hidden",marginTop:4}}>
                <div style={{position:"absolute",left:"30%",right:"30%",top:0,bottom:0,background:"rgba(255,255,255,.04)"}}/>
                <div style={{position:"absolute",left:rsi+"%",top:3,width:3,height:16,background:rsi<30?"#2ecc8f":rsi>70?"#e85d5d":"#f0a020",borderRadius:2,transform:"translateX(-50%)"}}/>
                <div style={{position:"absolute",left:"30%",top:2,width:1,bottom:2,background:"rgba(46,204,143,.3)"}}/>
                <div style={{position:"absolute",left:"70%",top:2,width:1,bottom:2,background:"rgba(232,93,93,.3)"}}/>
              </div>
              <div className="mono" style={{fontSize:13,fontWeight:800,color:rsi<30?"#2ecc8f":rsi>70?"#e85d5d":"#f0a020",marginTop:3}}>{rsi}
                <span style={{fontSize:9,color:"#8892a8",fontWeight:400,marginLeft:4}}>{rsi<30?"Survente":rsi>70?"Surachat":"Neutre"}</span>
              </div>
            </div>
          ) : (
            <div>
              <div className="lbl">RSI 14</div>
              <div className="dim" style={{fontSize:10,marginTop:4}}>Disponible après 15+ snapshots ({history?history.length:0} disponibles)</div>
            </div>
          )}
          {/* Beta */}
          {beta!=null ? (
            <div>
              <div className="lbl">Beta vs S&amp;P 500</div>
              <div className="mono" style={{fontSize:16,fontWeight:800,color:beta>1.3?"#e85d5d":beta<0.7?"#2ecc8f":"#f0a020",marginTop:4}}>{beta.toFixed(2)}</div>
              <div style={{fontSize:9,color:"#8892a8"}}>
                {beta>1.3?"Plus volatil que le marché":beta<0?"Décorrélé / inverse":beta<0.7?"Moins volatil que le marché":"Proche du marché"}
              </div>
            </div>
          ) : (
            <div>
              <div className="lbl">Beta vs S&amp;P 500</div>
              <div className="dim" style={{fontSize:10,marginTop:4}}>Données 3 ans insuffisantes</div>
            </div>
          )}
        </div>
        <div className="g2" style={{marginBottom:10}}>
          {/* Kelly */}
          {kellyPct!=null ? (
            <div>
              <div className="lbl">Taille Kelly (½K)</div>
              <div className="mono" style={{fontSize:16,fontWeight:800,color:"#4f83f5",marginTop:4}}>{kellyPct.toFixed(1)}%</div>
              <div style={{fontSize:9,color:"#8892a8"}}>portef. • actuel {fp(p.wt,1)}</div>
              <div style={{fontSize:9,color:p.wt<kellyPct?"#2ecc8f":p.wt>kellyPct*1.3?"#f0a020":"#3a4560"}}>
                {p.wt<kellyPct?"→ Sous-pondéré — renforcer":p.wt>kellyPct*1.3?"→ Sur-pondéré — alléger":"→ Taille correcte"}
              </div>
            </div>
          ) : (
            <div>
              <div className="lbl">Kelly sizing</div>
              <div className="dim" style={{fontSize:10,marginTop:4}}>Disponible après 20+ snapshots</div>
            </div>
          )}
        </div>
        {/* Fiscal */}
        {fiscal && (
          <div style={{paddingTop:8,borderTop:"1px solid rgba(255,255,255,.04)"}}>
            <div className="lbl">Impact fiscal ({fiscal.acct})</div>
            <div className="g3" style={{marginTop:4}}>
              <div><div style={{fontSize:9,color:"#3a4560"}}>Plus-value brute</div><div className="mono" style={{color:"#2ecc8f",fontSize:12}}>{fe(p.pnl)}</div></div>
              <div><div style={{fontSize:9,color:"#3a4560"}}>Taxe {fiscal.taxPct}%</div><div className="mono" style={{color:"#e85d5d",fontSize:12}}>-{fe(fiscal.tax)}</div></div>
              <div><div style={{fontSize:9,color:"#3a4560"}}>Net après impôt</div><div className="mono" style={{color:"#2ecc8f",fontSize:12,fontWeight:800}}>{fe(fiscal.net)}</div></div>
            </div>
          </div>
        )}
      </div>

      {/* CONVICTION AUTO-GÉRÉE */}
      <div className="card">
        <div className="cd-ti"><h3>Conviction auto-gérée</h3>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span onClick={()=>setCInfo(v=>!v)} title="À quoi sert la conviction auto-gérée ?"
              style={{cursor:"pointer",width:16,height:16,borderRadius:8,border:"1px solid",color:cInfo?"#4f83f5":"#8892a8",borderColor:cInfo?"#4f83f5":"#3a4560",
                fontSize:10,fontWeight:800,display:"inline-flex",alignItems:"center",justifyContent:"center",fontStyle:"italic",fontFamily:"Georgia,serif",flex:"0 0 auto"}}>{cInfo?"×":"i"}</span>
            <button className="bn bn-b" style={{fontSize:10,padding:"4px 10px"}}
              onClick={()=>{
                const an = AN[ticker];
                const age = dynConv.lu ? Math.floor((Date.now()-new Date(dynConv.lu))/86400000) : null;
                const chk = [
                  `Revue de thèse — ${ticker}`,
                  age!=null ? `Dernière revue il y a ${age} jours.` : "",
                  "",
                  "Avant de confirmer, as-tu vérifié :",
                  an && an.tgt ? `• Les objectifs analystes (${an.tgt.l}/${an.tgt.a}/${an.tgt.h}) sont-ils toujours d'actualité ?` : "• Les objectifs analystes sont-ils toujours d'actualité ?",
                  "• Les catalyseurs annoncés se sont-ils réalisés (ou sont-ils toujours attendus) ?",
                  "• Un risque nouveau est-il apparu (résultats, réglementation, concurrence) ?",
                  dynConv.divergent ? "• ⚠️ Le marché diverge de la thèse — as-tu compris pourquoi ?" : "",
                  "",
                  "Confirmer remet la conviction à son plein poids.",
                  "Ne confirme que si tu as réellement relu la thèse."
                ].filter(Boolean).join("\n");
                if(confirm(chk)){ markReviewed(ticker, p.pxNative); setReviewBump(b=>b+1); }
              }}>Marquer comme révisée</button>
          </div>
        </div>
        {reviewQuestions(ticker).length > 0 && (
          <div style={{background:"rgba(0,0,0,.22)",border:"1px solid rgba(255,255,255,.06)",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
            <div className="lbl" style={{marginBottom:6}}>Revue de thèse · à trancher pour {ticker}</div>
            {reviewQuestions(ticker).map((q,i)=>(
              <div key={i} style={{display:"flex",gap:7,padding:"5px 0",borderTop:i?"1px solid rgba(255,255,255,.04)":"none"}}>
                <span style={{flex:"0 0 auto",fontSize:10,color:q.k==="cat"?"#2ecc8f":q.k==="ris"?"#e85d5d":"#4f83f5"}}>
                  {q.k==="cat"?"▲":q.k==="ris"?"▼":"◆"}
                </span>
                <span style={{flex:1,fontSize:10,lineHeight:1.45}}>
                  <strong style={{color:"#dde3f0"}}>{q.label}</strong>
                  <span style={{color:"#8892a8"}}> — {q.q}</span>
                </span>
              </div>
            ))}
            <div style={{fontSize:9,color:"#3a4560",marginTop:6}}>
              ▲ catalyseurs à confirmer · ▼ risques à surveiller · ◆ objectifs à valider.
              {dynConv.divergent && <span style={{color:"#f0a020"}}> ⚠️ Le marché diverge de la thèse — comprends pourquoi avant de confirmer.</span>}
            </div>
          </div>
        )}
        {cInfo && (
          <div style={{background:"rgba(79,131,245,.06)",border:"1px solid rgba(79,131,245,.15)",borderRadius:8,padding:"10px 12px",marginBottom:10,fontSize:10,lineHeight:1.5,color:"#8892a8"}}>
            <div style={{color:"#dde3f0",fontWeight:700,marginBottom:4}}>À quoi ça sert ?</div>
            Une conviction d'analyste est un jugement figé à une date. Le problème : <strong>une thèse vieillit</strong>, et le marché peut lui donner tort avant qu'on la mette à jour. La conviction auto-gérée empêche une vieille certitude trop forte de fausser tes prévisions. Elle part de la <strong>conviction de base</strong> de l'analyste, puis la corrige seule par deux mécanismes :
            <div style={{marginTop:6,paddingLeft:4}}>
              <div style={{marginBottom:5}}><strong style={{color:"#f0a020"}}>× Décroissance.</strong> Plus la thèse est ancienne, plus la conviction s'érode (jusqu'à −50 % à un an). Une analyse d'il y a 10 mois pèse moins qu'une fraîche. Le bouton « Marquer comme révisée » remet le compteur à zéro.</div>
              <div><strong style={{color:"#4f83f5"}}>× Cohérence momentum.</strong> Le moteur compare la thèse au <strong>mouvement réel du cours sur 6 horizons</strong> (1 sem → 3 ans). Si le marché confirme la thèse, la conviction tient ; s'il va à l'inverse (divergence), elle est réduite — un signal d'alerte s'affiche alors.</div>
            </div>
            <div style={{marginTop:6}}>Résultat : <strong>base × décroissance × cohérence</strong>. Cette valeur ajustée alimente directement les prévisions P10/P50/P90 — c'est le « cap de fond » du moteur, tenu honnête par le temps et le marché.</div>
          </div>
        )}
        <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:10}}>
          <div className="mono" style={{fontSize:22,fontWeight:800,color:"#2ecc8f"}}>{ec}<span style={{fontSize:12,color:"#8892a8"}}>/100</span></div>
          <div style={{fontSize:10,color:"#8892a8"}}>
            base {AN[ticker]&&AN[ticker].c}/100 × décroissance {(dynConv.decay*100).toFixed(0)}% × cohérence {(dynConv.coherence*100).toFixed(0)}%
          </div>
        </div>
        <div className="dim" style={{fontSize:10,marginBottom:8}}>
          Thèse révisée le {dynConv.lu} · {dynConv.available}/5 horizons disponibles
        </div>
        <div className="g2" style={{rowGap:8}}>
          {MOMENTUM_HORIZONS.map(h=>{
            const v = dynConv.changes[h.key];
            return (
              <div key={h.key}>
                <div style={{fontSize:9,color:"#3a4560"}}>{h.label}</div>
                <div className="mono" style={{fontSize:13,color:v==null?"#3a4560":cl(v)}}>{v==null?"n/d":fp(v,1)}</div>
              </div>
            );
          })}
        </div>
        {dynConv.divergent && (
          <div style={{marginTop:10,padding:"8px 10px",background:"rgba(240,160,32,.08)",border:"1px solid rgba(240,160,32,.25)",borderRadius:6,fontSize:11,color:"#f0a020"}}>
            Le mouvement récent diverge de la tendance longue — la thèse pourrait être datée. Conviction réduite en conséquence.
          </div>
        )}
        <div style={{fontSize:9,color:"#3a4560",marginTop:10,fontStyle:"italic"}}>
          La conviction de base reste un jugement qualitatif de l'analyste, pas un score statistique — seule la décroissance et la cohérence momentum sont calculées automatiquement.
        </div>
      </div>

      {a.tgt && (
        <div className="card">
          <div className="cd-ti"><h3>Objectifs analystes</h3></div>
          <div className="g3">
            <div><div className="lbl">Bas</div><div className="mono">{fd(a.tgt.l)}</div></div>
            <div><div className="lbl">Médian</div><div className="mono"><strong>{fd(a.tgt.a)}</strong></div></div>
            <div><div className="lbl">Haut</div><div className="mono">{fd(a.tgt.h)}</div></div>
          </div>
        </div>
      )}

      {a.th && (
        <div className="card">
          <div className="cd-ti"><h3>Thèse</h3><span className={"chip "+a.sig}>{a.r}</span></div>
          <div style={{lineHeight:1.55}}>{a.th}</div>
          {a.edg && <div className="warn" style={{marginTop:10}}><strong>Edge :</strong> {a.edg}</div>}
        </div>
      )}

      {a.cat && (
        <div className="g2">
          <div className="card">
            <div className="cd-ti"><h3 style={{color:"#2ecc8f"}}>Catalyseurs</h3></div>
            {a.cat.map((c,i)=><div key={i} className="row" style={{padding:"6px 0"}}>{c}</div>)}
          </div>
          <div className="card">
            <div className="cd-ti"><h3 style={{color:"#e85d5d"}}>Risques</h3></div>
            {a.ris.map((r,i)=><div key={i} className="row" style={{padding:"6px 0"}}>{r}</div>)}
          </div>
        </div>
      )}

      <div className="card">
        <div className="cd-ti"><h3>Moteur 10 facteurs</h3><span className="dim" style={{fontSize:9}}>horizon {horizon}M</span></div>
        <div className="g3">
          <div><div className="lbl">P10</div><div className="mono" style={{color:"#e85d5d"}}>{fp(fAtH("p10"),0)}</div></div>
          <div><div className="lbl">P50</div><div className="mono"><strong>{fp(fAtH("p50"),0)}</strong></div></div>
          <div><div className="lbl">P90</div><div className="mono" style={{color:"#2ecc8f"}}>{fp(fAtH("p90"),0)}</div></div>
        </div>
        <div className="dim" style={{fontSize:10,marginTop:8,fontStyle:"italic"}}>Estimation probabiliste combinant conviction, momentum, volatilité et signal — pas une certitude.</div>
      </div>

      {a.act && (
        <div className="card" style={{background:"rgba(79,131,245,.08)",borderColor:"rgba(79,131,245,.3)"}}>
          <div className="cd-ti"><h3 style={{color:"#4f83f5"}}>Action recommandée</h3></div>
          <div style={{fontSize:14,fontWeight:600}}>{a.act}</div>
        </div>
      )}
    </div>
  );
}

/* ============== APP PRINCIPALE ============== */
function App() {
  const [locked, setLocked] = useState(() => Boolean(getPinHash()));
  const [port, setPort] = useState(() => {
    const s = loadStore(); return s?.port || PORT_DEF;
  });
  const [prices, setPrices] = useState(() => {
    const stored = loadStore()?.prices || {};
    // PRICE_DEF en fallback pour combler les éventuels trous → jamais "—" au boot
    return { ...PRICE_DEF, ...stored };
  });
  const [eurusd, setEurusd] = useState(() => loadStore()?.eurusd || FALLBACK_EURUSD);
  const [lastTs, setLastTs] = useState(() => loadStore()?.priceTs || 0);
  const [priceTsMap, setPriceTsMap] = useState(() => loadStore()?.priceTsMap || {});
  const [qHistMap, setQHistMap] = useState({});
  const [spyHist, setSpyHist] = useState([]);
  const [status, setStatus] = useState("ld");
  const [tab, setTab] = useState("today");
  const [cfgOpen, setCfgOpen] = useState(false);
  const [detail, setDetail] = useState(null);
  const [toast, setToast] = useState(null);
  const [alerts, setAlerts] = useState(loadAlerts);
  const [snapshots, setSnapshots] = useState([]);
  const [countdown, setCountdown] = useState(1);
  const [fetchCount, setFetchCount] = useState(0);
  const [notifPerm, setNotifPerm] = useState(typeof Notification !== "undefined" ? Notification.permission : "default");
  const [macroCtx, setMacroCtx] = useState(() => loadMacroCtx() || {});

  useEffect(() => {
    if(Object.keys(macroCtx).length===0) fetchMacroCtx().then(ctx=>{ if(ctx&&Object.keys(ctx).length>0) setMacroCtx(ctx); });
  }, []);

  // Historique hebdomadaire 3A par position — alimente la conviction auto-gérée + le benchmark
  useEffect(() => {
    port.forEach(p => {
      const sym = YF[p.t] ? YF[p.t].y : p.t;
      fetchQuarterlyHistory(sym).then(data => {
        if(data && data.length>0) setQHistMap(prev => ({ ...prev, [p.t]: data }));
      });
    });
    fetchQuarterlyHistory("SPY").then(data => { if(data && data.length>0) setSpyHist(data); });
  }, [port]);

  const busyRef = useRef(false);
  const lastTsRef = useRef(0);
  const portRef = useRef(port); useEffect(() => { portRef.current = port; }, [port]);
  const pricesRef = useRef(prices); useEffect(() => { pricesRef.current = prices; }, [prices]);
  const timerRef = useRef(null);
  const cdRef = useRef(null);
  const lastNotifRef = useRef({});

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  }, []);

  // Auto-init alertes pour positions sans seuils
  useEffect(() => {
    let changed = false;
    const next = { ...alerts };
    port.forEach(p => {
      if (!next[p.t]) {
        next[p.t] = { ...smartThresholds(p), on: true };
        changed = true;
      }
    });
    if (changed) { setAlerts(next); saveAlerts(next); }
  }, [port]);

  // Charger snapshots
  const reloadSnapshots = useCallback(async () => {
    const s = await snapshotsRange(0);
    setSnapshots(s.sort((a,b)=>a.ts-b.ts));
  }, []);
  useEffect(() => { reloadSnapshots(); }, [reloadSnapshots]);

  // Fetch principal
  const fetchAll = useCallback(async (silent) => {
    if (busyRef.current) return;
    // Cache : si un fetch auto a eu lieu il y a moins de PRICE_TTL, on ne re-sollicite pas les proxies
    if (silent && lastTsRef.current && Date.now() - lastTsRef.current < PRICE_TTL) return;
    busyRef.current = true;
    if (!silent) setStatus("ld");
    try {
      const { prices: np, priceTsMap: ntm, eurusd: ne } = await fetchAllPrices();
      setPrices(prev => ({ ...prev, ...np }));
      const mergedTsMap = { ...priceTsMap, ...ntm };
      setPriceTsMap(mergedTsMap);
      setEurusd(ne);
      const now = Date.now();
      setLastTs(now);
      lastTsRef.current = now;
      setStatus("");
      setFetchCount(c => c + 1);

      // Sauvegarde locale — on FUSIONNE avec le dernier prix vu de chaque ticker
      // pour ne jamais retomber sur la valeur figée au redémarrage (auto-réparation)
      const mergedPrices = { ...pricesRef.current, ...np };
      const enriched = enrich(portRef.current, mergedPrices, ne, mergedTsMap, convMapRef.current, null);
      const m = metrics(enriched);
      saveStore({ port: portRef.current, prices: mergedPrices, eurusd: ne, priceTs: now, priceTsMap: mergedTsMap });

      // Snapshot historique (max 1 par 5min)
      const last = snapshots[snapshots.length-1];
      if (!last || now - last.ts > 5*60*1000) {
        // Stocker les prévisions pour le suivi de précision
        const fcMap = {};
        enriched.forEach(p => {
          if(p.val) { const f=forecast(p,MACRO); fcMap[p.t]={p10:+f.p10.toFixed(3),p50:+f.p50.toFixed(3),p90:+f.p90.toFixed(3)}; }
        });
        const snap = {
          ts: now,
          date: new Date(now).toISOString().slice(0,10),
          tot: m.tot, inv: m.inv, pnl: m.pnl,
          eurusd: ne,
          spy: np["SPY"] || null, // benchmark S&P500
          port: enriched.map(p => ({ t:p.t, q:p.q, b:p.b, pxE:p.pxE, val:p.val })),
          forecasts: fcMap,
          pred3M: enriched.reduce((s,p) => {
            if (!p.val) return s;
            const f = forecast(p, MACRO);
            return s + p.val * (1 + f.p50 * 0.25);
          }, 0) / Math.max(1, m.tot) * 100 - 100
        };
        await snapshotAdd(snap);
        reloadSnapshots();
      }

      // Vérification alertes
      checkAlerts(enriched, alerts, np, ne, lastNotifRef.current);

      if (!silent && Object.keys(np).length > 0) showToast("✓ Cours actualisés");
    } catch(e) {
      console.error("[Fetch] global err", e);
      setStatus("er");
      if (!silent) showToast("✗ Erreur de récupération");
    } finally {
      busyRef.current = false;
    }
  }, [alerts, snapshots, showToast, reloadSnapshots, priceTsMap]);

  // Boot + interval
  useEffect(() => {
    fetchAll(true);                              // 1er chargement : toujours, même hors marché
    timerRef.current = setInterval(() => {
      if (document.hidden) return;               // pause quand l'onglet/écran est en arrière-plan
      if (!isMarketHours()) return;              // pause la nuit / le week-end (cours figés)
      fetchAll(true);
    }, REFRESH_MS);
    cdRef.current = setInterval(() => {
      setCountdown(c => {
        const elapsed = (Date.now() - (lastTs||Date.now())) / REFRESH_MS;
        return Math.max(0, 1 - elapsed);
      });
    }, 200);
    return () => { clearInterval(timerRef.current); clearInterval(cdRef.current); };
  // eslint-disable-next-line
  }, []);

  // Sync au retour de visibilité
  useEffect(() => {
    const onVis = () => { if (!document.hidden) fetchAll(false); };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, [fetchAll]);

  // Persistance portfolio
  useEffect(() => {
    saveStore({ port, prices, eurusd, priceTs: lastTs });
  }, [port]);

  // Persistance alertes
  useEffect(() => { saveAlerts(alerts); }, [alerts]);

  // Données dérivées
  // Conviction auto-gérée : lourde (6 horizons × historique) mais NE dépend PAS du prix live.
  // Mémoïsée ici pour ne recalculer qu'au changement de positions / historique / snapshots
  // (au lieu de chaque tick de 60 s → CPU divisé sur mobile).
  const convMap = useMemo(() => {
    const map = {};
    port.forEach(p => { map[p.t] = calcDynamicConviction(p.t, {}, snapshots, qHistMap && qHistMap[p.t]); });
    return map;
  }, [port, qHistMap, snapshots]);
  const convMapRef = useRef({});
  useEffect(() => { convMapRef.current = convMap; }, [convMap]);

  const enriched = useMemo(() => enrich(port, prices, eurusd, priceTsMap, convMap, qHistMap), [port, prices, eurusd, priceTsMap, convMap, qHistMap]);
  const m = useMemo(() => metrics(enriched), [enriched]);
  const sells = enriched.filter(p => p.sig === "sell").length;

  // Update countdown depuis lastTs
  useEffect(() => {
    setCountdown(1);
  }, [lastTs]);

  // Détail
  const detailPort = detail ? enriched.find(p => p.t === detail) : null;

  if(locked) return <LockScreen onUnlock={()=>setLocked(false)}/>;

  return (
    <div className="app">
      <Header
        countdownPct={countdown}
        status={status}
        lastTs={lastTs}
        paused={!isMarketHours()}
        onPillClick={() => fetchAll(false)}
        onSettings={() => setCfgOpen(true)}
      />

      <Strip m={m} alertCount={sells}/>

      {tab === "today" && <TodayView port={enriched} m={m} eurusd={eurusd} prices={prices} lastTs={lastTs} macroCtx={macroCtx} snapshots={snapshots} qHistMap={qHistMap} spyHist={spyHist} onSelect={setDetail} onTabChange={setTab} onRefresh={()=>fetchAll(false)}/>}
      {tab === "forecast" && <ForecastView port={enriched} m={m} onSelect={setDetail}/>}
      {tab === "memory" && <MemoryView snapshots={snapshots} port={enriched} m={m} eurusd={eurusd} qHistMap={qHistMap} spyHist={spyHist}/>}

      {detail && detailPort && <DetailView
        ticker={detail} port={enriched} snapshots={snapshots}
        alerts={alerts} eurusd={eurusd} onBack={() => setDetail(null)}
      />}

      {cfgOpen && (
        <div className="dt-ovr">
          <div className="bk" onClick={()=>setCfgOpen(false)}>← Retour</div>
          <CfgView
            port={port} alerts={alerts}
            onPortChange={setPort}
            onAlertsChange={setAlerts}
            onClearCache={() => { setPrices({}); showToast("Cache vidé"); fetchAll(false); }}
            onAskNotif={async () => {
              const ok = await askNotifPerm();
              setNotifPerm(Notification.permission);
              showToast(ok ? "✓ Notifications activées" : "✗ Notifications refusées");
            }}
            notifPerm={notifPerm}
            prices={prices}
            eurusd={eurusd}
            lastTs={lastTs}
            fetchCount={fetchCount}
            priceTsMap={priceTsMap}
          />
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}

      <nav className="tab">
        {[
          {k:"today",   ic:"●",l:"Actual"},
          {k:"forecast",ic:"◔",l:"Forecast"},
          {k:"memory",  ic:"◷",l:"Mémoire"}
        ].map(t => (
          <div key={t.k} className={"tb"+(tab===t.k?" ac":"")} onClick={() => { setTab(t.k); setDetail(null); setCfgOpen(false); }}>
            <div className="ic">{t.ic}</div>
            <div>{t.l}</div>
          </div>
        ))}
      </nav>
    </div>
  );
}

// Filet anti-crash : intercepte une erreur de rendu et propose une sortie propre
// (sans lui, une seule erreur affiche l'écran technique brut à la place de l'appli)
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { err:null }; }
  static getDerivedStateFromError(err){ return { err }; }
  componentDidCatch(err, info){ DBG && console.error("[Boundary]", err, info); }
  render(){
    if(!this.state.err) return this.props.children;
    return (
      <div style={{padding:"32px 20px",minHeight:"100vh",background:"#080b11",color:"#dde3f0",
        fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
        <div style={{fontSize:17,fontWeight:700,marginBottom:10}}>Souci d'affichage</div>
        <div style={{fontSize:12,color:"#8892a8",lineHeight:1.6,marginBottom:18}}>
          Une partie de l'écran n'a pas pu s'afficher. <strong style={{color:"#2ecc8f"}}>Tes données sont intactes</strong> — rien n'a été effacé.
          Recharger suffit presque toujours.
        </div>
        <button onClick={()=>window.location.reload()}
          style={{width:"100%",padding:"12px",borderRadius:9,border:"none",background:"#4f83f5",
            color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:10}}>Recharger l'application</button>
        <button onClick={()=>{ try{ localStorage.removeItem(HIST3Y_KEY); localStorage.removeItem(MACRO_CTX_KEY); }catch(e){} window.location.reload(); }}
          style={{width:"100%",padding:"11px",borderRadius:9,border:"1px solid rgba(255,255,255,.12)",
            background:"transparent",color:"#8892a8",fontSize:12,cursor:"pointer"}}>Recharger en vidant le cache des cours</button>
        <div style={{fontSize:10,color:"#3a4560",marginTop:16,lineHeight:1.5}}>
          Le second bouton n'efface que les cours mis en cache — jamais tes positions ni ton historique.
        </div>
        <details style={{marginTop:18}}>
          <summary style={{fontSize:10,color:"#3a4560",cursor:"pointer"}}>Détail technique</summary>
          <pre style={{fontSize:9,color:"#8892a8",whiteSpace:"pre-wrap",marginTop:8}}>
            {String(this.state.err && (this.state.err.stack || this.state.err.message || this.state.err))}
          </pre>
        </details>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);

</script>

<script>
// Retour au fonctionnement "site web simple" : on désinscrit tout service worker
// précédemment installé et on vide ses caches, pour qu'aucune version périmée
// ne soit servie et qu'il n'y ait plus d'interférence avec les autres applications
// hébergées sur le même domaine.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations()
    .then(rs => rs.forEach(r => r.unregister()))
    .catch(()=>{});
}
if (window.caches && caches.keys) {
  caches.keys().then(ks => ks.forEach(k => { if(/portfolio-fab/i.test(k)) caches.delete(k); })).catch(()=>{});
}
</script>
