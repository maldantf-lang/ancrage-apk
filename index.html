  function buildHabitsOverview(habits, dayCache, last7) {
    const wrap = el('div', 'overview-card');
    const shown = habits.slice(0, 3);
    const radii = [48, 38, 28];
    const circumferences = radii.map(r => 2 * Math.PI * r);

    let ringsHtml = '';
    shown.forEach((h, i) => {
      const doneCount = last7.filter(d => dayCache[d] && dayCache[d][h.id]).length;
      const ratio = doneCount / 7;
      const circ = circumferences[i];
      const offset = circ * (1 - ratio);
      ringsHtml += `
        <circle class="ring-bg" cx="55" cy="55" r="${radii[i]}"/>
        <circle class="ring-fg" cx="55" cy="55" r="${radii[i]}" stroke="${h.color}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
      `;
    });

    const legendHtml = shown.map(h => {
      const doneCount = last7.filter(d => dayCache[d] && dayCache[d][h.id]).length;
      return `<div class="legend-item"><span class="legend-dot" style="background:${h.color}"></span>${h.name}<span class="count">${doneCount}/7 j</span></div>`;
    }).join('');

    wrap.innerHTML = `
      <div class="rings-wrap">
        <svg viewBox="0 0 110 110">${ringsHtml}</svg>
        <div class="rings-center">
          <span class="num">${habits.length}</span>
          <span class="lbl">Suivi${habits.length>1?'s':''}</span>
        </div>
      </div>
      <div class="overview-legend">${legendHtml}</div>
    `;
    return wrap;
  }

  function buildHabitCard(habit, dayCache, last7, todayChecks) {
    const card = el('div', 'habit-card');
    const isDoneToday = !!todayChecks[habit.id];
    const freq = habit.frequency || 7;

    // calcule le streak de jours consécutifs se terminant aujourd'hui (ou hier si pas encore fait aujourd'hui)
    let streak = 0;
    let d = new Date();
    if (!isDoneToday) d.setDate(d.getDate() - 1);
    while (true) {
      const k = dateKey(d);
      const dayData = dayCache[k] !== undefined ? dayCache[k] : null;
      if (dayData && dayData[habit.id]) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }

    const doneThisWeek = last7.filter(dStr => dayCache[dStr] && dayCache[dStr][habit.id]).length;

    const weekDotsHtml = last7.map(dStr => {
      const done = dayCache[dStr] && dayCache[dStr][habit.id];
      return `<span class="week-dot${done ? ' done' : ''}" style="--dot-color:${habit.color}"></span>`;
    }).join('');

    // Pour une habitude quotidienne : le streak de jours consécutifs prime.
    // Pour une fréquence réduite (1 à 6x/semaine) : la progression sur les 7 derniers jours est plus parlante.
    const freqLabel = FREQUENCY_OPTIONS.find(f => f.value === freq)?.label || `${freq}x par semaine`;
    let subtitleHtml;
    if (freq >= 7) {
      subtitleHtml = streak > 0 ? `<b>${streak} jour${streak>1?'s':''}</b> de suite` : "Reprends aujourd'hui";
    } else {
      subtitleHtml = `<b>${doneThisWeek}/${freq}</b> cette semaine · objectif ${freqLabel}`;
    }

    card.innerHTML = `
      <div class="habit-icon" style="background:${habit.color}22; color:${habit.color};">${habit.icon}</div>
      <div class="habit-info">
        <div class="habit-name">${escapeHtml(habit.name)}</div>
        <div class="habit-streak">${subtitleHtml}</div>
      </div>
      <div class="habit-week">${weekDotsHtml}</div>
      <button class="habit-check${isDoneToday ? ' checked' : ''}" style="--check-color:${habit.color}">✓</button>
      <button class="habit-edit-icon" title="Modifier">✎</button>
    `;

    card.querySelector('.habit-check').onclick = async () => {
      await toggleHabit(habit.id, state.todayKey);
      render();
    };
    card.querySelector('.habit-edit-icon').onclick = () => showCustomHabitModal(habit);

    return card;
  }

  function showCustomHabitModal(existingHabit) {
    const isEdit = !!existingHabit;
    const overlay = el('div', 'modal-overlay');
    const colors = ['#6B8A6B','#6E7A93','#A8695C','#8B6F52','#8A7593','#C99A6C'];
    const currentFreq = existingHabit?.frequency || 7;

    const freqOptionsHtml = FREQUENCY_OPTIONS.map(f =>
      `<option value="${f.value}" ${f.value === currentFreq ? 'selected' : ''}>${f.label}</option>`
    ).join('');

    overlay.innerHTML = `
      <div class="modal-card">
        <h3 class="modal-title">${isEdit ? 'Modifier l\'habitude' : 'Nouvelle habitude'}</h3>
        <input type="text" id="custom-habit-name" placeholder="Nom de l'habitude" value="${isEdit ? escapeHtml(existingHabit.name) : ''}" style="margin-top:14px;">
        <label class="habit-freq-label">Fréquence visée</label>
        <select id="custom-habit-freq" class="habit-freq-select">${freqOptionsHtml}</select>
        <div class="custom-habit-colors" id="custom-habit-colors"></div>
        <div class="nav-row" style="margin-top:20px;">
          <button class="btn btn-ghost btn-block" id="custom-habit-cancel">Annuler</button>
          <button class="btn btn-primary btn-block" id="custom-habit-save">${isEdit ? 'Enregistrer' : 'Ajouter'}</button>
        </div>
        ${isEdit ? `<button class="btn btn-ghost btn-block habit-delete-btn" id="custom-habit-delete" style="margin-top:10px;">Supprimer cette habitude</button>` : ''}
      </div>
    `;
    document.body.appendChild(overlay);

    let selectedColor = existingHabit?.color || colors[0];
    const colorsWrap = overlay.querySelector('#custom-habit-colors');
    colors.forEach((c) => {
      const dot = el('div', 'custom-color-dot' + (c === selectedColor ? ' selected' : ''));
      dot.style.background = c;
      dot.onclick = () => {
        selectedColor = c;
        colorsWrap.querySelectorAll('.custom-color-dot').forEach(d => d.classList.remove('selected'));
        dot.classList.add('selected');
      };
      colorsWrap.appendChild(dot);
    });

    const close = () => overlay.remove();
    overlay.querySelector('#custom-habit-cancel').onclick = close;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

    overlay.querySelector('#custom-habit-save').onclick = async () => {
      const nameInput = overlay.querySelector('#custom-habit-name');
      const name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }
      const freq = parseInt(overlay.querySelector('#custom-habit-freq').value, 10);

      if (isEdit) {
        const idx = state.habitsList.findIndex(h => h.id === existingHabit.id);
        if (idx !== -1) {
          state.habitsList[idx] = { ...state.habitsList[idx], name, color: selectedColor, frequency: freq };
        }
      } else {
        state.habitsList.push({
          id: 'habit_custom_' + Date.now(),
          name,
          category: 'personnalise',
          icon: '⟡',
          color: selectedColor,
          frequency: freq,
          createdAt: state.todayKey
        });
      }
      await saveHabitsList();
      close();
      render();
    };

    if (isEdit) {
      overlay.querySelector('#custom-habit-delete').onclick = () => {
        showConfirmModal(
          'Supprimer cette habitude ?',
          "L'historique des jours déjà cochés pour cette habitude restera visible dans le détail de tes journées passées, mais elle n'apparaîtra plus dans ton suivi actif ni dans les statistiques.",
          async () => {
            // Archivage plutôt que suppression : les coches passées restent lisibles dans le
            // détail de chaque jour, mais l'habitude disparaît des écrans actifs (accueil,
            // coche du jour, calendrier, statistiques en cours).
            const idx = state.habitsList.findIndex(h => h.id === existingHabit.id);
            if (idx !== -1) state.habitsList[idx] = { ...state.habitsList[idx], archived: true };
            await saveHabitsList();
            close();
            render();
          },
          'Supprimer'
        );
      };
    }
  }

  async function renderAnchor(content) {
    const top = el('div', 'topbar');
    top.innerHTML = `<h1>Mon ancrage</h1><span style="width:38px;"></span>`;
    content.appendChild(top);

    const screen = el('div', 'screen');
    screen.innerHTML = `<p class="q-hint">Rassemblement de tes forces…</p>`;
    content.appendChild(screen);

    const allDates = Object.keys(state.entriesIndex).sort().reverse();
    const items = [];
    for (const dStr of allDates) {
      const entry = await decryptEntry(dStr);
      if (!entry || !entry.sections) continue;
      entry.sections.forEach(section => {
        ANCHOR_QUESTION_IDS.forEach(qid => {
          const val = section.answers && section.answers[qid];
          if (val && typeof val === 'string' && val.trim().length > 2) {
            items.push({ date: dStr, text: val.trim() });
          }
        });
      });
    }

    screen.innerHTML = '';
    if (!items.length) {
      screen.innerHTML = `<div class="empty-state"><span class="ic">🌟</span>Tes phrases bienveillantes et actes de courage apparaîtront ici au fil de tes entrées.<br><br>Essaie "La petite voix malveillante" ou "Les actes de courage" pour commencer.</div>`;
      return;
    }

    const intro = el('p', 'q-hint');
    intro.style.marginBottom = '18px';
    intro.textContent = "Tout ce que tu as écrit sur toi-même, quand tu étais bienveillant·e ou courageux·se. Relis ça quand tu doutes.";
    screen.appendChild(intro);

    items.forEach(item => {
      const card = el('div', 'anchor-item');
      card.innerHTML = `
        <div class="anchor-item-text">"${escapeHtml(item.text)}"</div>
        <div class="anchor-item-date">${formatDateLong(item.date)}</div>
      `;
      screen.appendChild(card);
    });
  }

  // ---------- ENTRY DETAIL ----------
  async function renderEntryDetail(content) {
    const top = el('div', 'topbar');
    top.innerHTML = `<button class="icon-btn" id="entry-back">←</button><h1 style="font-size:1.1rem;">${formatDateLong(state.selectedEntryDate)}</h1><span style="width:38px;"></span>`;
    content.appendChild(top);

    const screen = el('div', 'screen');
    screen.innerHTML = `<p class="q-hint">Déchiffrement…</p>`;
    content.appendChild(screen);
    top.querySelector('#entry-back').onclick = () => { state.screen = 'calendar'; render(); };

    const entry = await decryptEntry(state.selectedEntryDate);
    const habitChecks = state.habitsEnabled ? await decryptHabitDay(state.selectedEntryDate) : null;
    screen.innerHTML = '';

    const hasJournal = entry && entry.sections && entry.sections.length;
    const hasHabits = state.habitsEnabled && habitChecks && Object.keys(habitChecks).length;

    if (!hasJournal && !hasHabits) {
      screen.innerHTML = `<div class="empty-state"><span class="ic">📭</span>Aucune entrée lisible pour ce jour.</div>`;
      return;
    }

    const detail = el('div', 'entry-detail');

    if (hasJournal) {
    entry.sections.forEach((section, sIdx) => {
      const isQuick = section.kind === 'quick';
      const sectionCard = el('div', 'entry-section' + (isQuick ? ' entry-section-quick' : ' entry-section-full'));
      let editing = false;

      function renderSectionBody() {
        sectionCard.innerHTML = '';
        const headerRow = el('div', 'entry-section-header');
        const timeStr = section.ts ? new Date(section.ts).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }) : '';
        headerRow.innerHTML = `
          <span class="entry-section-icon">${isQuick ? '✦' : '🌿'}</span>
          <span class="entry-section-title">${section.title || (isQuick ? 'Le point du jour' : 'Exercice')}</span>
          ${timeStr ? `<span class="entry-section-time">${timeStr}</span>` : ''}
          <button class="icon-btn entry-edit-btn" id="edit-btn-${sIdx}" title="${editing ? 'Annuler' : 'Modifier'}">${editing ? '✕' : '✎'}</button>
        `;
        sectionCard.appendChild(headerRow);

        const editableInputs = {};

        Object.entries(section.answers).forEach(([qid, val]) => {
          const isEmpty = val === undefined || val === null || val === '' || (Array.isArray(val) && !val.length);
          if (isEmpty && !editing) return;
          const block = el('div', 'entry-block');
          const qLabel = findQuestionLabel(qid);

          if (Array.isArray(val)) {
            // les émotions (chips) restent en lecture seule même en mode édition, pour limiter la complexité
            const chipsHtml = val.map(v => `<span class="entry-mood-chip">${escapeHtml(v)}</span>`).join('');
            block.innerHTML = `<div class="entry-q">${qLabel}</div><div class="entry-mood-chips">${chipsHtml}</div>`;
          } else if (typeof val === 'number') {
            // les scores (sliders) restent aussi en lecture seule dans cette première version
            block.innerHTML = `<div class="entry-q">${qLabel}</div><div class="entry-a entry-a-number">${val}%</div>`;
          } else if (editing) {
            block.innerHTML = `<div class="entry-q">${qLabel}</div>`;
            const ta = document.createElement('textarea');
            ta.className = 'entry-edit-textarea';
            ta.value = val || '';
            block.appendChild(ta);
            editableInputs[qid] = ta;
          } else {
            block.innerHTML = `<div class="entry-q">${qLabel}</div><div class="entry-a">${escapeHtml(val)}</div>`;
          }
          sectionCard.appendChild(block);
        });

        if (editing) {
          const saveBtn = document.createElement('button');
          saveBtn.className = 'btn btn-primary btn-block';
          saveBtn.textContent = 'Enregistrer les modifications';
          saveBtn.style.marginTop = '10px';
          saveBtn.onclick = async () => {
            Object.entries(editableInputs).forEach(([qid, ta]) => {
              section.answers[qid] = ta.value.trim();
            });
            await saveEditedEntry(entry);
            editing = false;
            renderSectionBody();
            showToast('Modifications enregistrées');
          };
          sectionCard.appendChild(saveBtn);
        }

        sectionCard.querySelector(`#edit-btn-${sIdx}`).onclick = () => {
          editing = !editing;
          renderSectionBody();
        };
      }

      renderSectionBody();
      detail.appendChild(sectionCard);
    });
    } // fin du if (hasJournal)

    if (hasHabits) {
      const habitSection = el('div', 'entry-section entry-section-habits');
      const headerRow = el('div', 'entry-section-header');
      headerRow.innerHTML = `
        <span class="entry-section-icon">◎</span>
        <span class="entry-section-title">Habitudes du jour</span>
      `;
      habitSection.appendChild(headerRow);

      // Le détail d'un jour passé garde l'accès à TOUTES les habitudes (y compris archivées),
      // pour honorer l'historique — mais une habitude archivée ne s'affiche que si elle a
      // effectivement été cochée ce jour-là, pour ne pas polluer chaque jour d'anciennes
      // catégories qu'on ne suit plus activement.
      state.habitsList
        .filter(habit => !habit.archived || habitChecks[habit.id])
        .forEach(habit => {
        const done = !!habitChecks[habit.id];
        const row = el('div', 'habit-detail-row');
        row.innerHTML = `
          <span class="dot" style="background:${habit.color}"></span>
          <span class="name">${escapeHtml(habit.name)}</span>
          <span class="status ${done ? 'done' : 'missed'}">${done ? '✓ Fait' : '— Non coché'}</span>
        `;
        habitSection.appendChild(row);
      });

      detail.appendChild(habitSection);
    }

    screen.appendChild(detail);
  }

  // Réécrit l'entrée du jour sélectionné après une édition, en réutilisant le sel existant
  // pour rester compatible avec le déchiffrement des autres champs déjà stockés.
  async function saveEditedEntry(entry) {
    const encrypted = await Crypto.encrypt(state.password, entry, state.entriesIndex[state.selectedEntryDate]?.salt);
    await Store.putEntry(state.selectedEntryDate, encrypted);
    state.entriesIndex[state.selectedEntryDate] = encrypted;
    state.decryptedCache[state.selectedEntryDate] = entry;
  }

  // Anciens IDs de questions qui n'existent plus dans le contenu actuel, mais qui peuvent apparaître
  // dans des entrées enregistrées avant une mise à jour de l'app. On garde leur libellé d'origine
  // pour que ces entrées passées restent lisibles.
  const LEGACY_QUESTION_LABELS = {
    'besoin_jour': "De quoi ai-je besoin aujourd'hui ?"
  };

  function findQuestionLabel(qid) {
    const all = [...QUICK_FLOW, ...FULL_VOIX.steps, ...FULL_COURAGE.steps, ...FULL_REVEIL.steps, ...FULL_PENSEES.steps, ...BILAN_STEPS];
    const found = all.find(q => q.id === qid);
    if (found) return found.text;
    if (LEGACY_QUESTION_LABELS[qid]) return LEGACY_QUESTION_LABELS[qid];
    return qid;
  }

  // ---------- SETTINGS ----------
  // ---------- EXPORT / IMPORT ----------
  // L'export ne contient QUE des données déjà chiffrées (mêmes payloads que ceux stockés en
  // local) : le fichier exporté reste protégé par le mot de passe, même s'il est intercepté.
  async function handleExportData() {
    const all = await Store.getAllEntries();
    const verifier = await Store.getMeta('verifier');
    const backup = {
      app: 'ancrage',
      version: 1,
      exportedAt: new Date().toISOString(),
      verifier,
      entries: all
    };
    const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `ancrage-sauvegarde-${dateStr}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Sauvegarde téléchargée');
  }

  async function handleImportData(file) {
    if (!file) return;
    try {
      const text = await file.text();
      const backup = JSON.parse(text);
      if (!backup || backup.app !== 'ancrage' || !Array.isArray(backup.entries)) {
        showToast('Fichier de sauvegarde invalide');
        return;
      }
      // vérifie que la sauvegarde correspond bien au mot de passe actuellement déverrouillé,
      // pour éviter d'importer des entrées chiffrées avec une autre clé et illisibles ensuite
      if (backup.verifier) {
        const ok = await Crypto.checkVerifier(state.password, backup.verifier);
        if (!ok) {
          showConfirmModal(
            'Mot de passe différent',
            "Cette sauvegarde a été faite avec un autre mot de passe. Les entrées importées resteront illisibles avec ton mot de passe actuel. Importer quand même ?",
            () => doImportEntries(backup.entries),
            'Importer quand même'
          );
          return;
        }
      }
      await doImportEntries(backup.entries);
    } catch (e) {
      showToast('Impossible de lire ce fichier');
    }
  }

  async function doImportEntries(entries) {
    let count = 0;
    for (const e of entries) {
      if (!e.date || !e.payload) continue;
      await Store.putEntry(e.date, e.payload);
      state.entriesIndex[e.date] = e.payload;
      delete state.decryptedCache[e.date]; // forcer un redéchiffrement propre après import
      count++;
    }
    showToast(`${count} entrée${count>1?'s':''} importée${count>1?'s':''}`);
    render();
  }

  function renderSettings(content) {
    const top = el('div', 'topbar');
    top.innerHTML = `<h1>Réglages</h1><span style="width:38px;"></span>`;
    content.appendChild(top);

    const screen = el('div', 'screen screen-settings');
    const r = state.reminderSettings;
    const timeStr = String(r.hour).padStart(2,'0') + ':' + String(r.minute).padStart(2,'0');
    screen.innerHTML = `
      <div class="settings-row">
        <div><div class="t">Rappel quotidien</div><div class="d">Une notification si tu n'as pas encore écrit aujourd'hui</div></div>
        <label class="switch">
          <input type="checkbox" id="set-reminder-toggle" ${r.enabled ? 'checked' : ''}>
          <span class="switch-track"><span class="switch-thumb"></span></span>
        </label>
      </div>
      <div class="settings-row" id="reminder-time-row" style="${r.enabled ? '' : 'display:none;'}">
        <div><div class="t">Heure du rappel</div><div class="d">À quel moment de la journée ?</div></div>
        <input type="time" id="set-reminder-time" value="${timeStr}" class="time-input">
      </div>
      ${r.enabled ? `<p class="q-hint" style="margin-bottom:18px;">Le rappel fonctionne tant que l'app reste ouverte en arrière-plan. Si tu l'as complètement fermée, ouvre-la une fois dans la journée pour qu'il se déclenche.</p>` : ''}
      <div class="settings-row">
        <div><div class="t">Tracker d'habitudes</div><div class="d">Sport, méditation, sommeil… ${state.habitsEnabled ? "Désactive-le si tu ne veux plus le voir — ton historique reste intact et réapparaît si tu le réactives." : "Actuellement masqué. Ton historique passé est conservé et réapparaîtra si tu le réactives."}</div></div>
        <label class="switch">
          <input type="checkbox" id="set-habits-toggle" ${state.habitsEnabled ? 'checked' : ''}>
          <span class="switch-track"><span class="switch-thumb"></span></span>
        </label>
      </div>
      <div class="settings-row">
        <div><div class="t">Verrouiller maintenant</div><div class="d">Reviens à l'écran de mot de passe. L'app se verrouille aussi automatiquement après 5 minutes d'inactivité.</div></div>
        <button class="btn btn-ghost btn-sm" id="set-lock">Verrouiller</button>
      </div>
      <div class="settings-row">
        <div><div class="t">Stockage</div><div class="d">100% local sur cet appareil, chiffré AES-256. Rien n'est envoyé en ligne.</div></div>
      </div>
      <div class="settings-row">
        <div><div class="t">Exporter mes données</div><div class="d">Télécharge une sauvegarde chiffrée (fichier .json) à garder en lieu sûr.</div></div>
        <button class="btn btn-ghost btn-sm" id="set-export">Exporter</button>
      </div>
      <div class="settings-row">
        <div><div class="t">Importer une sauvegarde</div><div class="d">Restaure des entrées depuis un fichier exporté. Nécessite le même mot de passe.</div></div>
        <button class="btn btn-ghost btn-sm" id="set-import">Importer</button>
        <input type="file" id="set-import-file" accept=".json" style="display:none;">
      </div>
      <div class="settings-row">
        <div><div class="t">Tout effacer</div><div class="d">Supprime définitivement toutes les entrées et le mot de passe.</div></div>
        <button class="btn btn-ghost btn-sm" id="set-wipe" style="color:#C96F42; border-color:#C96F42;">Effacer</button>
      </div>
    `;
    content.appendChild(screen);

    screen.querySelector('#set-export').onclick = handleExportData;
    const importInput = screen.querySelector('#set-import-file');
    screen.querySelector('#set-import').onclick = () => importInput.click();
    importInput.onchange = (e) => handleImportData(e.target.files[0]);

    const toggle = screen.querySelector('#set-reminder-toggle');
    const timeRow = screen.querySelector('#reminder-time-row');
    const timeInput = screen.querySelector('#set-reminder-time');

    toggle.onchange = async () => {
      if (toggle.checked) {
        const perm = await Reminder.requestPermission();
        if (perm !== 'granted') {
          toggle.checked = false;
          showToast(perm === 'unsupported' ? "Notifications non supportées sur cet appareil" : "Autorise les notifications pour activer le rappel");
          return;
        }
      }
      state.reminderSettings.enabled = toggle.checked;
      timeRow.style.display = toggle.checked ? '' : 'none';
      await Store.setMeta('reminder', state.reminderSettings);
      showToast(toggle.checked ? 'Rappel activé' : 'Rappel désactivé');
    };

    timeInput.onchange = async () => {
      const [hh, mm] = timeInput.value.split(':').map(Number);
      state.reminderSettings.hour = hh;
      state.reminderSettings.minute = mm;
      state.reminderSettings.lastFiredDate = null;
      await Store.setMeta('reminder', state.reminderSettings);
      showToast('Heure mise à jour : ' + timeInput.value);
    };

    screen.querySelector('#set-habits-toggle').onchange = async (e) => {
      state.habitsEnabled = e.target.checked;
      await Store.setMeta('habitsEnabled', state.habitsEnabled);
      showToast(state.habitsEnabled ? 'Tracker d\'habitudes activé' : 'Tracker d\'habitudes désactivé');
      render();
    };

    screen.querySelector('#set-lock').onclick = lockApp;
    screen.querySelector('#set-wipe').onclick = () => {
      showConfirmModal(
        'Effacer tout le journal ?',
        'Cette action est irréversible : toutes les entrées et le mot de passe seront définitivement supprimés.',
        async () => {
          await Store.deleteAll();
          state.password = null;
          state.entriesIndex = {};
          state.decryptedCache = {};
          state.habitsList = [];
          state.habitsIndex = {};
          state.habitsDecryptedCache = {};
          state.reminderSettings = { enabled: false, hour: 20, minute: 0, lastFiredDate: null };
          state.screen = 'setup';
          render();
        },
        'Effacer'
      );
    };
  }

  // ---------- BOTTOM NAV ----------
  function renderBottomNav() {
    const nav = el('div', 'bottom-nav');
    const items = [
      { key:'home', ic:'✎', label:'Journal' },
      { key:'calendar', ic:'▦', label:'Calendrier' },
      { key:'habits', ic:'◎', label:'Habitudes' },
      { key:'stats', ic:'∿', label:'Suivi' },
      { key:'settings', ic:'⚙', label:'Réglages' }
    ].filter(it => it.key !== 'habits' || state.habitsEnabled);
    items.forEach(it => {
      const btn = el('button', 'nav-btn' + (state.screen===it.key ? ' active':''));
      btn.innerHTML = `<span class="ic">${it.ic}</span>${it.label}`;
      btn.onclick = () => { state.screen = it.key; render(); };
      nav.appendChild(btn);
    });
    return nav;
  }

  // ---------- HELPERS ----------
  // ---------- CONFIRM MODAL (remplace window.confirm, peu fiable en PWA/APK) ----------
  function showConfirmModal(title, message, onConfirm, confirmLabel) {
    const overlay = el('div', 'modal-overlay');
    overlay.innerHTML = `
      <div class="modal-card">
        <h3 class="modal-title">${title}</h3>
        <p class="modal-msg">${message}</p>
        <div class="nav-row" style="margin-top:20px;">
          <button class="btn btn-ghost btn-block" id="modal-cancel">Annuler</button>
          <button class="btn btn-primary btn-block" id="modal-confirm">${confirmLabel || 'Quitter'}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const close = () => overlay.remove();
    overlay.querySelector('#modal-cancel').onclick = close;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
    overlay.querySelector('#modal-confirm').onclick = () => { close(); onConfirm(); };
  }

  function el(tag, className) {
    const e = document.createElement(tag);
    if (className) e.className = className;
    return e;
  }
  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDateLong(dStr) {
    const [y,m,d] = dStr.split('-').map(Number);
    return new Date(y, m-1, d).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
  }

  return { init };
})();

document.addEventListener('DOMContentLoaded', App.init);
</script>
