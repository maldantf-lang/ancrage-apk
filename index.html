// Base AUTO-CALIBRÉE : remplace les seuils fixes qui vieillissaient. Si le marché monte,
// l'historique monte aussi → « cher » reste jugé par rapport à la tendance récente de l'actif.
function pctRank(hist, cur) {
  const vals = (hist||[]).map(d=>d.px).filter(v=>v>0);
  if(vals.length < 10 || !(cur>0)) return null;
  const below = vals.filter(v=>v <= cur).length;
  return +(below / vals.length).toFixed(3);
}

  const proxUrls = [
    `https://allorigins.win/raw?url=${encodeURIComponent(yUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(yUrl)}`,

  ];

      const ts = res.timestamp||[];

      const data = ts.map((t,i)=>({

  }
  return [];
}

  if(hasCtx && ctx.gldPct != null && ctx.gldPct > 0.70) {
    const stressMult = 1 + Math.min(0.2, (ctx.gldPct - 0.70) / 1.5);
    Object.keys(shocks).forEach(k => { if(shocks[k] < 0) shocks[k] = +(shocks[k] * stressMult).toFixed(3); });

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(SNAP_STORE)) {
        const s = db.createObjectStore(SNAP_STORE, { keyPath: "ts" });
        s.createIndex("date", "date", { unique: false });
      }
    };
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
const SNAP_KEEP_MS = 400 * 24 * 3600 * 1000;   // on conserve ~13 mois (horizon max utile : 12 mois)
async function snapshotAdd(snap) {
  try {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(SNAP_STORE, "readwrite");
      const store = tx.objectStore(SNAP_STORE);
      store.put(snap);
      // Purge : supprime tout ce qui dépasse la fenêtre de conservation (évite une base sans fin)
      const cutoff = Date.now() - SNAP_KEEP_MS;
      const purge = store.openCursor(IDBKeyRange.upperBound(cutoff, true));
      purge.onsuccess = (e) => { const c = e.target.result; if(c){ c.delete(); c.continue(); } };
      tx.oncomplete = () => { db.close(); res(); };
      tx.onerror = () => { db.close(); rej(tx.error); };
    });
  } catch(e) { DBG && console.warn("[DB] add err", e); }
}
async function snapshotsRange(fromTs) {
  try {
    const db = await openDB();
    return new Promise((res) => {
      const tx = db.transaction(SNAP_STORE, "readonly");
      const out = [];
      // Lecture bornée par la clé (ts) : ne parcourt plus toute la base
      const req = tx.objectStore(SNAP_STORE).openCursor(IDBKeyRange.lowerBound(fromTs));
      req.onsuccess = (e) => {
        const c = e.target.result;
        if (c) { out.push(c.value); c.continue(); }
        else { db.close(); res(out); }
      };
      req.onerror = () => { db.close(); res([]); };
    });
  } catch(e) { return []; }
}

async function fetchOne(url, isWrap) {
  const ctrl = new AbortController();
  const to = setTimeout(() => ctrl.abort(), 9000);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(to);
    if (!r.ok) throw new Error("http " + r.status);
    const j = await r.json();
    const data = isWrap ? JSON.parse(j.contents) : j;
    const px = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
    if (!isFinite(px) || px <= 0) throw new Error("invalid price");

  } catch(e) { clearTimeout(to); throw e; }

function priceEUR(t, prices, eurusd) {
  const meta = YF[t]; const px = prices[t];
  if (px == null || !meta) return null;
  return meta.ccy === "EUR" ? px : px / eurusd;

// Signal EFFECTIF : combine la vue analyste (structurelle) avec l'action de prix LIVE.
// Rend le verdict réactif au marché (position vs objectifs analystes + RSI) sans inventer
// de nouveaux fondamentaux. Le prix natif est comparé aux objectifs (même devise).
function effectiveSignal(t, prices, qHist) {
  const an = AN[t];
  const baseSig = (an && an.sig) || "hold";
  if(baseSig === "spec") return { sig:"spec", base:baseSig, drift:false, rsi:null, reason:"pari binaire — indépendant du prix" };
  const pxN = (prices && prices[t] != null) ? prices[t] : null;
  let score = baseSig==="buy" ? 2 : baseSig==="sell" ? -2 : 0;
  const notes = [];
  if(an && an.tgt && pxN!=null){
    if(pxN >= an.tgt.h){ score -= 2; notes.push("au-dessus de l'objectif haut"); }
    else if(pxN <= an.tgt.l){ score += 2; notes.push("sous l'objectif bas"); }
  }
  const rsi = (qHist && qHist.length>=16) ? calcRSI(qHist.map(d=>d.px),14) : null;
  if(rsi!=null){
    if(rsi>=70){ score -= 1; notes.push("RSI surachat "+rsi); }
    else if(rsi<=30){ score += 1; notes.push("RSI survente "+rsi); }
  }
  const sig = score>=2 ? "buy" : score<=-2 ? "sell" : "hold";
  return { sig, base:baseSig, drift: sig!==baseSig, rsi, reason: notes.length ? notes.join(" · ") : "aligné avec l'analyste" };
}

function enrich(port, prices, eurusd, priceTsMap, convMap, qHistMap) {
  const now = Date.now();
  const items = port.map(p => {
    const inv = p.q * p.b;
    const pxE = priceEUR(p.t, prices, eurusd);
    const val = pxE != null ? p.q * pxE : null;
    const pnl = val != null ? val - inv : null;
    const pct = (val != null && inv > 0) ? (pnl / inv) * 100 : null;
    const ts = priceTsMap && priceTsMap[p.t] ? priceTsMap[p.t] : null;
    const priceAge = ts != null ? now - ts : null;
    // Conviction pré-calculée (mémoïsée hors du tick prix) ; secours = conviction de base analyste
    const dynConv = (convMap && convMap[p.t]) || {
      value: AN[p.t] ? AN[p.t].c : 50, decay: 1, coherence: 1, changes: {}, available: 0, divergent: false, lu: AN[p.t] ? getANLu(p.t) : null
    };
    const eff = effectiveSignal(p.t, prices, qHistMap && qHistMap[p.t]);
    const pxNative = (prices && prices[p.t] != null) ? prices[p.t] : null;
    return { ...p, inv, pxE, val, pnl, pct, priceAge, dynConv, pxNative,
      effSig:eff.sig, effBase:eff.base, effDrift:eff.drift, effReason:eff.reason, rsiLive:eff.rsi };
  });
  const tot = items.reduce((s,p) => s + (p.val || 0), 0);
  return items.map(p => ({ ...p, wt: tot > 0 && p.val ? (p.val/tot)*100 : 0 }));
}

// 1. Boussole contrarian : humeur de foule par position (-100 euphorie → +100 capitulation)
// Positif = foule trop pessimiste (opportunité d'achat), négatif = foule euphorique (prudence).
function crowdCompass(p) {
  const an = AN[p.t];
  const rsi = p.rsiLive;
  let score = 0; const notes = [];
  if(rsi != null){
    if(rsi >= 70){ score -= (rsi-70)*2; notes.push("RSI élevé"); }
    else if(rsi <= 30){ score += (30-rsi)*2; notes.push("RSI bas"); }
  }
  const pxN = p.pxNative != null ? p.pxNative : null;
  if(an && an.tgt && pxN != null){
    if(pxN >= an.tgt.h){ score -= 30; notes.push("au-dessus objectif haut"); }
    else if(pxN <= an.tgt.l){ score += 30; notes.push("sous objectif bas"); }
  }
  score = Math.max(-100, Math.min(100, Math.round(score)));
  const mood = score >= 40 ? "Capitulation" : score >= 15 ? "Pessimisme"
    : score <= -40 ? "Euphorie" : score <= -15 ? "Optimisme" : "Neutre";
  const advice = score >= 40 ? "Fenêtre d'achat probable — la foule sur-vend"
    : score <= -40 ? "Prudence — la foule est euphorique, anticiper l'allègement"
    : score >= 15 ? "Léger excès de pessimisme" : score <= -15 ? "Léger excès d'optimisme" : "Sentiment équilibré";
  return { score, mood, advice, notes };
}

// 2. Score de timing 0-100 (mauvais → excellent moment pour agir) par position
// Décompose le score de timing en étapes lisibles (pour l'exemple pédagogique en direct)
function explainTiming(p) {
  const rsi = p.rsiLive, an = AN[p.t], pxN = p.pxNative;
  if(rsi == null && !(an && an.tgt && pxN != null)) return null;
  const steps = [];
  let s = 50;
  if(rsi != null){
    let d;
    if(rsi <= 30){ d = 25; steps.push({ txt:`RSI ${rsi} → survendu (sous 30), le titre sort d'un creux`, d }); }
    else if(rsi >= 70){ d = -25; steps.push({ txt:`RSI ${rsi} → suracheté (au-dessus de 70), il vient de bien monter`, d }); }
    else { d = (50-rsi)*0.3; steps.push({ txt:`RSI ${rsi} → zone neutre`, d }); }
    s += d;
  }
  if(an && an.tgt && pxN != null){
    const band = an.tgt.h - an.tgt.l;
    if(band > 0){
      const pos = (pxN - an.tgt.l)/band;
      const d = (0.5 - pos)*30;
      steps.push({ txt:`Cours ${pxN.toFixed(0)} vs objectifs ${an.tgt.l}/${an.tgt.a}/${an.tgt.h} → ${pos<0.5?"sous":"au-dessus de"} la médiane, ${pos<0.5?"il reste du potentiel":"c'est déjà cher"}`, d });
      s += d;
    }
  }
  const total = Math.max(0, Math.min(100, Math.round(s)));
  return { steps, total, label: total>=70?"Bon moment":total>=45?"Neutre":"Patienter" };
}

function timingScore(p) {
  const rsi = p.rsiLive;
  let s = 50; const parts = [];
  if(rsi != null){
    if(rsi <= 30){ s += 25; parts.push("survendu"); }
    else if(rsi >= 70){ s -= 25; parts.push("suracheté"); }
    else { s += (50-rsi)*0.3; }
  }
  const an = AN[p.t]; const pxN = p.pxNative;
  if(an && an.tgt && pxN != null){
    const band = an.tgt.h - an.tgt.l;
    if(band > 0){ const pos = (pxN - an.tgt.l)/band; s += (0.5 - pos)*30; parts.push(pos<0.5?"sous médiane":"au-dessus médiane"); }
  }
  s = Math.max(0, Math.min(100, Math.round(s)));
  const label = s>=70?"Bon moment":s>=45?"Neutre":"Patienter";
  return { score:s, label, parts };
}

// 3. Simulateur d'impact : effet d'un achat de eurAmount € sur une position
function simulateBuy(port, ticker, eurAmount) {
  const p = port.find(x=>x.t===ticker); if(!p || !(eurAmount>0)) return null;
  const totBefore = port.reduce((s,x)=>s+(x.val||0),0);
  const totAfter = totBefore + eurAmount;
  const valAfter = (p.val||0) + eurAmount;
  const sec = p.s;
  const secValBefore = port.filter(x=>x.s===sec).reduce((s,x)=>s+(x.val||0),0);
  const secValAfter = secValBefore + eurAmount;
  return {
    wtBefore: totBefore>0 ? (p.val||0)/totBefore*100 : 0,
    wtAfter:  totAfter>0 ? valAfter/totAfter*100 : 0,
    secBefore: totBefore>0 ? secValBefore/totBefore*100 : 0,
    secAfter:  totAfter>0 ? secValAfter/totAfter*100 : 0,
    totAfter, sector: sec,
    concentrationFlag: totAfter>0 && valAfter/totAfter*100 > 35
  };
}

// 4. Rééquilibrage chiffré : € à investir répartis vers les meilleures convictions sous-pondérées
function rebalancePlan(port, cashEur) {
  if(!(cashEur>0)) return null;
  const cands = port.filter(p => p.val!=null && (p.effSig||p.sig)==="buy")
    .map(p => ({ t:p.t, n:p.n, conv:(AN[p.t]&&AN[p.t].c)||50, wt:p.wt }))
    .sort((a,b)=> b.conv - a.conv);
  if(cands.length===0) return null;
  const wsum = cands.reduce((s,c)=>s+c.conv,0);
  return cands.map(c => ({ ...c, eur: +(cashEur * c.conv / wsum).toFixed(2) }));
}

// 5. Concentration cachée : groupes de positions fortement corrélées (>0.7)
function hiddenClusters(port, corrMat) {
  if(!corrMat) return [];
  const tickers = Object.keys(corrMat);
  const seen = new Set(); const clusters = [];
  tickers.forEach(ti => {
    if(seen.has(ti)) return;
    const grp = [ti];
    tickers.forEach(tj => { if(tj!==ti && corrMat[ti][tj]!=null && corrMat[ti][tj] > 0.7){ grp.push(tj); seen.add(tj); } });
    if(grp.length >= 2){
      seen.add(ti);
      const wt = grp.reduce((s,t)=>{ const p=port.find(x=>x.t===t); return s+(p?p.wt:0); },0);
      clusters.push({ tickers:grp, wt:+wt.toFixed(1) });
    }
  });
  return clusters.filter(c => c.wt > 25);
}

function metrics(port) {
  let tot=0, inv=0, pnl=0, wv2=0, wp=0, miss=0, stale=0;
  port.forEach(p => {
    inv += p.inv;
    if (p.val == null) { miss++; return; }
    if (isStale(p.priceAge)) stale++;
    tot += p.val; pnl += p.pnl;
    wv2 += Math.pow((p.v||20) * p.wt/100, 2);
    wp  += (p.pct||0) * p.wt / 100;
  });
  const wv = Math.sqrt(wv2) * Math.sqrt(1.5);
  return { tot, inv, pnl, wv, wp, sh: wv > 0 ? (wp - 3.5) / wv : 0, miss, stale };
}

/* ============== SCORE DE SANTÉ ============== */
function calcHealth(port, m) {
  const valid = port.filter(p => p.val != null && p.wt > 0);
  const n = valid.length || 1;
  const hhi = valid.reduce((s,p) => s + Math.pow(p.wt/100, 2), 0);
  const hhiNorm = n > 1 ? (hhi - 1/n) / (1 - 1/n) : 1;
  const div = Math.round(25 * (1 - Math.min(1, hhiNorm)));
  const topPos = valid.reduce((b,p) => p.wt > b.wt ? p : b, {wt:0, t:"—"});
  const wPos = valid.filter(p => p.pct != null && p.pct > 0).reduce((s,p) => s + p.wt, 0);
  const negCount = valid.filter(p => p.pct != null && p.pct < 0).length;
  const res = Math.round(25 * wPos / 100);
  const momNorm = Math.min(1, Math.max(0, (m.wp + 20) / 40));
  const mom = Math.round(25 * momNorm);
  let convW = 0, convTot = 0;
  valid.forEach(p => { const a = AN[p.t]; if(a) { convW += a.c * p.wt; convTot += p.wt; }});
  const avgConv = convTot > 0 ? Math.round(convW / convTot) : 0;
  const conv = Math.round(25 * avgConv / 100);
  const diag = {
    div: {
      detail: `HHI normalisé ${(hhiNorm*100).toFixed(0)}% · ${n} positions actives · 0% = parfait, 100% = mono-position`,
      issue: topPos.wt > 35 ? `${topPos.t} représente ${topPos.wt.toFixed(0)}% — concentration critique` : topPos.wt > 20 ? `${topPos.t} à ${topPos.wt.toFixed(0)}% — surveiller` : "Répartition équilibrée entre les positions",
      tip: topPos.wt > 30 ? `Alléger ${topPos.t}, réinvestir sur 2-3 autres positions` : n < 6 ? "Ajouter des positions pour diversifier davantage" : "Maintenir la répartition actuelle"
    },
    res: {
      detail: `${wPos.toFixed(0)}% de la valeur en profit · ${negCount} position${negCount>1?"s":""} en perte actuellement`,
      issue: wPos < 40 ? "Majorité du portefeuille en territoire négatif" : wPos < 65 ? "Résilience modérée, quelques positions fragilisent l'ensemble" : "Portefeuille résilient — majorité des positions gagnantes",
      tip: wPos < 55 ? "Réévaluer les positions en perte : stop-loss ou renforcement ?" : "Protéger les gains via des alertes de seuil haut (Réglages)"
    },
    mom: {
      detail: `Perf. pondérée ${m.wp >= 0 ? "+" : ""}${m.wp.toFixed(1)}% · calibré sur cible 10-20%/an · plage [-20%, +20%] → 0-25pts`,
      issue: m.wp > 30 ? "Fort momentum — surveiller le biais de confirmation" : m.wp > 10 ? "Dans la zone cible 10-20%/an" : m.wp > 0 ? "Momentum positif mais sous la cible annuelle" : "Momentum négatif — révision stratégique recommandée",
      tip: m.wp < 0 ? "Identifier les freins et revoir l'allocation sectorielle" : m.wp > 40 ? "Envisager des prises de profit partielles sur les leaders" : "Maintenir le cap, ajuster les positions sous-performantes"
    },
    conv: {
      detail: `Conviction analyste pondérée ${avgConv}/100 · seuils : ≥80 fort, ≥60 modéré, <60 faible`,
      issue: avgConv >= 80 ? "Très forte conviction — thèses d'investissement solides" : avgConv >= 65 ? "Bonne conviction d'ensemble" : avgConv >= 50 ? "Conviction modérée, quelques positions spéculatives" : "Conviction faible — portefeuille à requalifier",
      tip: avgConv < 60 ? "Renforcer NVDA/MSFT/AMZN (conv. 90-95) et alléger les spéculatifs" : "Profil solide — capitaliser sur les thèses à haute conviction"
    }
  };
  return { total: div+res+mom+conv, div, res, mom, conv, diag };
}

function reviewNeeds(p, ov) {
  const an = AN[p.t]; if(!an) return null;
  const all = ov || loadANOverrides();          // lecture unique fournie par l'appelant
  const rec = all[p.t] || {};
  const lu = rec.lu || an.lu || "2026-05-01";

  if(age >= REVIEW_AGE_DAYS) { reasons.push({ txt:`Thèse non revue depuis ${age} jours`, w: age>=180?3:2 }); sev += age>=180?3:2; }
  if(p.dynConv && p.dynConv.divergent) { reasons.push({ txt:"Le marché s'écarte durablement de la thèse", w:3 }); sev += 3; }
  if(p.effDrift) { reasons.push({ txt:`Verdict ajusté au prix : ${p.effReason}`, w:2 }); sev += 2; }

/* ============== CONVICTION AUTO-GÉRÉE — MOMENTUM MULTI-HORIZON ============== */
// Compare le cours actuel à ses propres valeurs passées (-1sem, -1mois, -90j, -6m, -1an)
// pour détecter si la tendance récente diverge de la tendance longue (thèse potentiellement datée)
function findNearestSnapshotPx(snapshots, ticker, targetTs, toleranceMs) {
  let best=null, bestDiff=Infinity;
  for(const s of snapshots) {
    const diff = Math.abs(s.ts - targetTs);
    if(diff < bestDiff) {
      const pos = (s.port||[]).find(x=>x.t===ticker);
      if(pos && pos.pxE!=null) { best = pos.pxE; bestDiff = diff; }
    }
  }
  return (best!=null && bestDiff<=toleranceMs) ? best : null;
}
function findNearestQuarterPx(qHist, targetTs, toleranceMs) {
  if(!qHist||qHist.length===0) return null;
  let best=null, bestDiff=Infinity;
  for(const d of qHist) {
    const diff = Math.abs(d.ts - targetTs);
    if(diff < bestDiff && d.px>0) { best = d.px; bestDiff = diff; }
  }
  return (best!=null && bestDiff<=toleranceMs) ? best : null;
}

const MOMENTUM_HORIZONS = [
  { key:"w1",  label:"-1 semaine", days:7,    tolDays:6,  src:"quar" },
  { key:"m1",  label:"-1 mois",    days:30,   tolDays:12, src:"quar" },
  { key:"d90", label:"-90 jours",  days:90,   tolDays:20, src:"quar" },
  { key:"m6",  label:"-6 mois",    days:182,  tolDays:25, src:"quar" },
  { key:"y1",  label:"-1 an",      days:365,  tolDays:35, src:"quar" },
  { key:"y3",  label:"-3 ans",     days:1095, tolDays:70, src:"quar" }
];

function calcMultiHorizonMomentum(ticker, pos, snapshots, qHist) {
  const now = Date.now(), DAY = 86400000;
  const changes = {};
  MOMENTUM_HORIZONS.forEach(h => {
    if(h.src==="snap") {
      const histPx = findNearestSnapshotPx(snapshots||[], ticker, now-h.days*DAY, h.tolDays*DAY);
      changes[h.key] = (histPx!=null && pos.pxE!=null && histPx>0) ? +((pos.pxE-histPx)/histPx*100).toFixed(1) : null;
    } else {
      const histPx = findNearestQuarterPx(qHist||[], now-h.days*DAY, h.tolDays*DAY);
      const nowPx = qHist&&qHist.length>0 ? qHist[qHist.length-1].px : null;
      changes[h.key] = (histPx!=null && nowPx!=null && histPx>0) ? +((nowPx-histPx)/histPx*100).toFixed(1) : null;
    }
  });
  const available = Object.values(changes).filter(v=>v!=null).length;
  const shortVals = [changes.w1, changes.m1].filter(v=>v!=null);
  const longVals = [changes.d90, changes.m6, changes.y1].filter(v=>v!=null);
  let coherence = 1, divergent = false;
  if(shortVals.length>0 && longVals.length>0) {
    const shortAvg = shortVals.reduce((s,v)=>s+v,0)/shortVals.length;
    const longAvg = longVals.reduce((s,v)=>s+v,0)/longVals.length;
    const diff = Math.abs(shortAvg-longAvg);
    const sameDir = (shortAvg>=0)===(longAvg>=0) || diff<10; // <10pts d'écart = bruit normal, jamais pénalisé
    const mag = Math.min(1, Math.max(0,diff-10)/50);
    coherence = sameDir ? 1+Math.min(0.05,mag*0.05) : 1-Math.min(0.25,mag*0.30);
    divergent = !sameDir && diff>=15;
  }
  return { changes, coherence:+coherence.toFixed(3), available, divergent };
}

// Conviction finale = conviction analyste × décroissance temporelle × cohérence momentum
function calcDynamicConviction(ticker, pos, snapshots, qHist) {
  const an = AN[ticker];
  if(!an) return { value:50, decay:1, coherence:1, changes:{}, available:0, divergent:false, lu:null };
  const lu = getANLu(ticker);
  const days = (Date.now()-new Date(lu))/86400000;
  const decay = Math.max(0.5, 1-days/365);
  const mom = calcMultiHorizonMomentum(ticker, pos, snapshots, qHist);
  const value = Math.max(10, Math.min(100, Math.round(an.c*decay*mom.coherence)));
  return { value, decay:+decay.toFixed(3), coherence:mom.coherence, changes:mom.changes, available:mom.available, divergent:mom.divergent, lu };
}

// Benchmark portefeuille vs SPY recalculé sur l'historique RÉEL (hebdo Yahoo),
// sans dépendre des snapshots. Panier à composition constante (quantités actuelles).
// Le change est neutralisé : valNow et valPast utilisent le même eurusd → pur effet prix.
function calcHistBenchmark(port, qHistMap, spyHist, eurusd) {
  if(!spyHist || spyHist.length<2 || !port || port.length===0) return null;
  const now = Date.now(), DAY = 86400000;
  const spyNow = spyHist[spyHist.length-1].px;
  const valNow = port.reduce((s,p)=> s + (p.val||0), 0);
  if(!(spyNow>0) || !(valNow>0)) return null;
  return MOMENTUM_HORIZONS.map(h => {
    const tgt = now - h.days*DAY, tol = h.tolDays*DAY;
    const spyPast = findNearestQuarterPx(spyHist, tgt, tol);
    let valPast = 0, ok = true;
    for(const p of port){
      const qh = (qHistMap||{})[p.t];
      const pastPx = findNearestQuarterPx(qh||[], tgt, tol);
      if(pastPx==null){ ok = false; break; }
      const meta = YF[p.t];
      const pastEUR = (meta && meta.ccy==="EUR") ? pastPx : pastPx/eurusd;
      valPast += p.q * pastEUR;
    }
    if(!ok || spyPast==null || !(valPast>0)) return { key:h.key, label:h.label, avail:false };
    const portRet = (valNow - valPast)/valPast*100;
    const spyRet  = (spyNow - spyPast)/spyPast*100;
    return { key:h.key, label:h.label, avail:true,
      portRet:+portRet.toFixed(1), spyRet:+spyRet.toFixed(1), alpha:+(portRet-spyRet).toFixed(1) };
  });
}

// RSI Wilder 14 périodes — entrée : tableau de prix croissants
function calcRSI(prices, period) {
  const p = period || 14;
  if(!prices||prices.length<p+2) return null;
  let gains=0, losses=0;
  for(let i=1;i<=p;i++){
    const d=prices[i]-prices[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  let ag=gains/p, al=losses/p;
  for(let i=p+1;i<prices.length;i++){
    const d=prices[i]-prices[i-1];
    ag=(ag*(p-1)+Math.max(0,d))/p;
    al=(al*(p-1)+Math.max(0,-d))/p;
  }
  if(al===0) return 100;
  return +(100-100/(1+ag/al)).toFixed(1);
}

// Kelly fraction (half-Kelly, cap 25%)
function calcKelly(convPct, p50Annual, snapCount) {
  if(snapCount!=null&&snapCount<20) return null; // pas assez de données
  const p = Math.min(0.88, convPct/100);
  const q = 1-p;
  const b = Math.max(0.3, Math.abs(p50Annual>0?p50Annual:0.1));
  const kelly = (p*b-q)/b;
  return Math.max(0, Math.min(25, kelly/2*100));
}

// Beta vs SPY depuis données trimestrielles
function calcBeta(posPrices, spyPrices) {
  const n = Math.min(posPrices.length, spyPrices.length)-1;
  if(n<4) return null;
  const posR=[], spyR=[];
  for(let i=0;i<n;i++){
    posR.push((posPrices[i+1]-posPrices[i])/posPrices[i]);
    spyR.push((spyPrices[i+1]-spyPrices[i])/spyPrices[i]);
  }
  const mn=arr=>arr.reduce((a,b)=>a+b,0)/arr.length;
  const mPos=mn(posR), mSpy=mn(spyR);
  let cov=0, varSpy=0;
  for(let i=0;i<n;i++){
    cov+=(posR[i]-mPos)*(spyR[i]-mSpy);
    varSpy+=Math.pow(spyR[i]-mSpy,2);
  }
  if(varSpy===0) return null;
  return +(cov/varSpy).toFixed(2);
}

/* ============== SCORE DE RISQUE SYNTHÉTIQUE (par position) ============== */
// Combine 5 dimensions en un score 0-100 (100 = risque max) pour décision rapide
function calcRiskScore({ vol, rsi, beta, wt, p10, ec }) {
  const parts = [];
  // 1. Volatilité brute (0-100% → poids 25)
  const vScore = Math.min(25, (vol||25)/60*25);
  parts.push({k:"vol", label:"Volatilité", score:vScore, max:25, val:vol});
  // 2. RSI extrême (zones <30 ou >70 = risque, 50 = neutre) — poids 20
  let rScore = 10;
  if(rsi!=null) rScore = rsi>70 ? 10+(rsi-70)/30*10 : rsi<30 ? 10+(30-rsi)/30*10 : Math.abs(rsi-50)/50*10;
  parts.push({k:"rsi", label:"RSI extrême", score:Math.min(20,rScore), max:20, val:rsi});
  // 3. Beta vs marché (>1.5 ou <0 = risque) — poids 20
  let bScore = 8;
  if(beta!=null) bScore = beta>1.5 ? 12+Math.min(8,(beta-1.5)*6) : beta<0 ? 16 : Math.abs(beta-1)*8;
  parts.push({k:"beta", label:"Beta marché", score:Math.min(20,bScore), max:20, val:beta});
  // 4. Concentration (poids du portefeuille) — poids 20
  const cScore = Math.min(20, (wt||0)/40*20);
  parts.push({k:"conc", label:"Concentration", score:cScore, max:20, val:wt});
  // 5. Downside prévisionnel P10 — poids 15
  const dScore = p10!=null ? Math.min(15, Math.max(0, -p10*100/40*15)) : 7.5;
  parts.push({k:"down", label:"Downside P10", score:dScore, max:15, val:p10});
  const total = Math.round(parts.reduce((s,x)=>s+x.score,0));
  return { total: Math.min(100,total), parts };
}

  const proxUrls = [
    `https://allorigins.win/raw?url=${encodeURIComponent(yUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(yUrl)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(yUrl)}`
  ];
  for(const proxy of proxUrls) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(()=>ctrl.abort(), 8000);
      const r = await fetch(proxy, {signal:ctrl.signal});
      clearTimeout(t);
      const json = await r.json();
      const earn = json?.quoteSummary?.result?.[0]?.calendarEvents?.earnings;

        return null;
      }
    } catch(e) { continue; }
  }
  return null;
}

// Corrélation de Pearson entre deux séries de rendements
function pearson(a, b) {
  const n = Math.min(a.length,b.length); if(n<4) return null;
  const ma=a.slice(0,n).reduce((s,x)=>s+x,0)/n;
  const mb=b.slice(0,n).reduce((s,x)=>s+x,0)/n;
  let num=0, da=0, db=0;
  for(let i=0;i<n;i++){
    num+=(a[i]-ma)*(b[i]-mb);
    da+=Math.pow(a[i]-ma,2);
    db+=Math.pow(b[i]-mb,2);
  }
  if(da===0||db===0) return null;
  return +(num/Math.sqrt(da*db)).toFixed(2);
}

// Corrélations inter-positions depuis l'historique HEBDO réel (sans snapshots, dispo immédiatement)
function calcHistCorrelations(port, qHistMap) {
  const tickers = port.map(p=>p.t).filter(t => ((qHistMap||{})[t]||[]).length >= 8);
  if(tickers.length < 2) return null;
  const rets = {};
  tickers.forEach(t => {
    const h = qHistMap[t]; const r = [];
    for(let i=1;i<h.length;i++){ if(h[i-1].px>0) r.push((h[i].px-h[i-1].px)/h[i-1].px); }
    rets[t] = r;
  });
  const mat = {};
  tickers.forEach(ti => {
    mat[ti] = {};
    tickers.forEach(tj => {
      if(ti===tj){ mat[ti][tj]=1.0; return; }
      const a=rets[ti], b=rets[tj], n=Math.min(a.length,b.length);
      mat[ti][tj] = n>=4 ? pearson(a.slice(a.length-n), b.slice(b.length-n)) : null;
    });
  });
  const weeks = Math.max(0, ...tickers.map(t=>rets[t].length));
  return { mat, tickers, weeks };
}

// Calcule les corrélations inter-positions depuis snapshots
// Précision du moteur : compare P50 stocké vs prix réel
function calcMotorPrecision(snapshots) {
  const tracked=[];
  for(let i=0;i<snapshots.length-1;i++){
    const snap=snapshots[i];
    if(!snap.forecasts) continue;
    const laterIdx=snapshots.findIndex((s,j)=>j>i&&s.ts-snap.ts>=30*86400000);
    if(laterIdx<0) continue;
    const later=snapshots[laterIdx];
    Object.entries(snap.forecasts).forEach(([t,fc]) => {
      const pos0=(snap.port||[]).find(p=>p.t===t);
      const posL=(later.port||[]).find(p=>p.t===t);
      if(!pos0||!posL||!pos0.pxE||!posL.pxE) return;
      const actual=(posL.pxE-pos0.pxE)/pos0.pxE;
      const inBand=actual>=fc.p10&&actual<=fc.p90;
      tracked.push({t,actual:+(actual*100).toFixed(1),p50:+(fc.p50*100).toFixed(1),inBand});
    });
  }
  if(tracked.length===0) return null;
  const accuracy=tracked.filter(x=>x.inBand).length/tracked.length*100;
  return {accuracy:+accuracy.toFixed(0),count:tracked.length,samples:tracked.slice(-6)};
}

/* ============== ALERTES SEUILS ============== */
function smartThresholds(pos, pxE) {
  // Calcul intelligent des seuils par défaut basés sur PRU et volatilité
  const v = pos.v || 25;
  const lo = +(pos.b * (1 - Math.min(0.20, v/100 * 0.5))).toFixed(2);
  const hi = +(pos.b * (1 + Math.min(0.40, v/100 * 1.0))).toFixed(2);
  return { lo, hi };
}
function checkAlerts(port, alerts, prices, eurusd, lastNotifRef) {
  const now = Date.now();
  port.forEach(p => {
    const pxE = priceEUR(p.t, prices, eurusd);
    if (pxE == null) return;
    const a = alerts[p.t]; if (!a || !a.on) return;
    const lastT = lastNotifRef[p.t] || 0;
    if (now - lastT < 3600000) return; // 1h cooldown par ticker
    if (a.hi && pxE >= a.hi) {
      notify(`🎯 ${p.t} a atteint le seuil HAUT`, `${pxE.toFixed(2)}€ ≥ ${a.hi}€ — prise de profit`);
      lastNotifRef[p.t] = now;
    } else if (a.lo && pxE <= a.lo) {
      notify(`⚠️ ${p.t} sous le seuil BAS`, `${pxE.toFixed(2)}€ ≤ ${a.lo}€ — stop-loss`);
      lastNotifRef[p.t] = now;
    }
  });
}

/* ============== MOTEUR PRÉVISION 10 FACTEURS ============== */
function forecast(pos, mac) {
  const an = AN[pos.t] || {};
  // 10 facteurs (compactés) : conviction, momentum sectoriel, signal, volatilité, position cycle, etc.
  const f1 = (pos.dynConv ? pos.dynConv.value : (an.c || 50)) / 100; // conviction auto-gérée (décroissance + cohérence momentum)
  const f2 = an.sig === "buy" ? 1 : an.sig === "sell" ? -1 : an.sig === "spec" ? .3 : 0;
  const f3 = (an.p || 0) / 100;           // proj 12M brute
  const f4 = pos.sig === "buy" ? .6 : pos.sig === "sell" ? -.4 : 0;
  const f5 = (pos.v || 25) / 100;         // volatilité
  const f6 = pos.pct != null ? Math.tanh(pos.pct/100) : 0; // momentum perso
  const f7 = ["IA","Tech","Défense","Énergie"].includes(pos.s) ? .15 : 0; // tailwind sectoriel
  const f8 = pos.s === "Énergie" && pos.sig === "sell" ? -.10 : 0;
  const f9 = mac && mac.regime?.includes("stagflation") ? -.05 : 0;
  const f10 = an.tgt ? (an.tgt.a / Math.max(0.01, pos.b) - 1) * 0.3 : 0;
  const mu12 = f3*0.5 + (f1-0.5)*0.10 + f2*0.06 + f4*0.04 + f6*0.08 + f7 + f8 + f9 + f10*0.4;
  const sigma12 = Math.max(0.10, f5 * 1.2);
  // P10/P50/P90
  return {
    p10: mu12 - 1.28 * sigma12,
    p50: mu12,
    p90: mu12 + 1.28 * sigma12,
    sigma: sigma12,
    factors: { f1,f2,f3,f4,f5,f6,f7,f8,f9,f10 }
  };
}

// Mini-courbe 90 jours (≈13 points hebdo) pour la liste des positions
function Sparkline({ hist, w, h }) {
  const W = w || 52, H = h || 18;
  const pts = (hist || []).slice(-13).map(d => d.px).filter(v => v > 0);
  if(pts.length < 4) return <div style={{width:W,height:H}}/>;
  const min = Math.min(...pts), max = Math.max(...pts), range = (max - min) || 1;
  const up = pts[pts.length-1] >= pts[0];
  const col = up ? "#2ecc8f" : "#e85d5d";
  const d = pts.map((v,i) => (i===0?"M":"L") + (i/(pts.length-1)*W).toFixed(1) + "," + (H - ((v-min)/range)*H).toFixed(1)).join(" ");
  return (
    <svg width={W} height={H} style={{display:"block"}} aria-hidden="true">
      <path d={d} fill="none" stroke={col} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

// REVUE DE THÈSE ASSISTÉE — l'appli prépare le dossier, l'utilisateur garde la décision
// Questions de revue SPÉCIFIQUES à la position, construites depuis sa propre thèse
function reviewQuestions(ticker) {
  const an = AN[ticker]; if(!an) return [];
  const qs = [];
  (an.cat||[]).forEach(c => qs.push({ k:"cat", label:c, q:"réalisé, toujours attendu, ou tombé à l'eau ?" }));
  (an.ris||[]).forEach(r => qs.push({ k:"ris", label:r, q:"s'est-il matérialisé depuis ?" }));
  if(an.tgt) qs.push({ k:"tgt", label:`Objectifs ${an.tgt.l} / ${an.tgt.a} / ${an.tgt.h}`, q:"toujours crédibles au vu des derniers résultats ?" });
  return qs;
}

function HistoryView({ snapshots, port, eurusd, qHistMap, spyHist }) {
  const [period, setPeriod] = useState("30j");
  const days = period === "7j" ? 7 : period === "30j" ? 30 : period === "90j" ? 90 : 99999;
  const cutoff = Date.now() - days * 86400000;
  const data = snapshots.filter(s => s.ts >= cutoff).map(s => ({
    ts: s.ts,
    date: new Date(s.ts).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}),
    val: s.tot, pnl: s.pnl, inv: s.inv
  }));
  const cur    = port.reduce((s,p)=>s+(p.val||0),0);
  const curPnl = port.reduce((s,p)=>s+(p.pnl||0),0);
  const curInv = port.reduce((s,p)=>s+p.inv,0);
  const first  = data.length > 0 ? data[0].val : cur;
  const delta  = cur - first;
  const deltaPct = first > 0 ? (delta/first)*100 : 0;

  const allVals  = data.map(d=>d.val).concat([cur]);
  const peak     = allVals.length ? Math.max(...allVals) : cur;
  const trough   = allVals.length ? Math.min(...allVals) : cur;
  const drawdown = peak > 0 ? ((trough-peak)/peak)*100 : 0;
  const firstDate = data.length > 0 ? new Date(data[0].ts).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"}) : "—";

  const contribs = port.filter(p=>p.val!=null&&p.pnl!=null)
    .map(p=>({t:p.t,n:p.n,pnl:p.pnl,pct:p.pct,wt:p.wt}))
    .sort((a,b)=>b.pnl-a.pnl);
  const maxAbsPnl = Math.max(...contribs.map(x=>Math.abs(x.pnl)), 0.01);

  return (
    <>
      <div className="card">
        <div className="cd-ti">
          <h3>Valeur du portefeuille</h3>
          <span className="num" style={{fontSize:12,color:cl(delta)}}>{fp(deltaPct)} • {fe(delta)}</span>
        </div>
        <div className="seg">
          {["7j","30j","90j","tout"].map(k=>
            <div key={k} className={"it"+(period===k?" ac":"")} onClick={()=>setPeriod(k)}>{k}</div>
          )}
        </div>
        {data.length < 2 ? (
          <div className="warn">Historique en cours de constitution — {snapshots.length} snapshot{snapshots.length>1?"s":""}. Premiers points dans quelques jours d'utilisation continue.</div>
        ) : (
          <div style={{height:200,marginTop:8}}>
            <ResponsiveContainer>
              <AreaChart data={data} margin={{top:5,right:5,left:0,bottom:0}}>
                <defs>
                  <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="#4f83f5" stopOpacity={0.4}/>
                    <stop offset="100%" stopColor="#4f83f5" stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <CartesianGrid stroke="rgba(255,255,255,.04)" vertical={false}/>
                <XAxis dataKey="date" stroke="#3a4560" fontSize={10} tickLine={false}/>
                <YAxis stroke="#3a4560" fontSize={10} tickLine={false} axisLine={false}
                  tickFormatter={v=>v.toFixed(0)+"€"} width={45}/>
                <Tooltip contentStyle={{background:"#0f1420",border:"1px solid rgba(255,255,255,.1)",borderRadius:6,fontSize:12}}
                  formatter={v=>[fe(v),"Valeur"]}/>
                <Area type="monotone" dataKey="val" stroke="#4f83f5" strokeWidth={2} fill="url(#gv)"/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        )}
      </div>

      {data.length >= 2 && (
        <div className="card">
          <div className="cd-ti">
            <h3>P&amp;L cumulé</h3>
            <span className="num" style={{fontSize:12,color:cl(curPnl)}}>{fe(curPnl)} <span className="dim" style={{fontWeight:400}}>({fp(curPnl/curInv*100,1)})</span></span>
          </div>
          <div style={{height:160}}>
            <ResponsiveContainer>
              <AreaChart data={data} margin={{top:5,right:5,left:0,bottom:0}}>
                <defs>
                  <linearGradient id="gpnl" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="#2ecc8f" stopOpacity={0.35}/>
                    <stop offset="100%" stopColor="#2ecc8f" stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <CartesianGrid stroke="rgba(255,255,255,.04)" vertical={false}/>
                <XAxis dataKey="date" stroke="#3a4560" fontSize={10} tickLine={false}/>
                <YAxis stroke="#3a4560" fontSize={10} tickLine={false} axisLine={false}
                  tickFormatter={v=>v.toFixed(0)+"€"} width={45}/>
                <Tooltip contentStyle={{background:"#0f1420",border:"1px solid rgba(255,255,255,.1)",borderRadius:6,fontSize:12}}
                  formatter={v=>[fe(v),"P&L"]}/>
                <ReferenceLine y={0} stroke="rgba(255,255,255,.15)" strokeDasharray="3 3"/>
                <Area type="monotone" dataKey="pnl" stroke="#2ecc8f" strokeWidth={2} fill="url(#gpnl)"/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      <div className="card">
        <div className="cd-ti"><h3>Statistiques de la période</h3><span className="dim" style={{fontSize:10}}>depuis {firstDate}</span></div>
        <div className="g3">
          <div><div className="lbl">Plus-haut</div><div className="mono" style={{fontSize:14,color:"#2ecc8f"}}>{fe(peak,0)}</div></div>
          <div><div className="lbl">Plus-bas</div><div className="mono" style={{fontSize:14}}>{fe(trough,0)}</div></div>
          <div><div className="lbl">Drawdown max</div><div className="mono" style={{fontSize:14,color:"#e85d5d"}}>{fp(drawdown,1)}</div></div>
        </div>
        <div className="g3" style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,.04)"}}>
          <div><div className="lbl">Investi</div><div className="mono" style={{fontSize:13}}>{fe(curInv)}</div></div>
          <div><div className="lbl">Valeur</div><div className="mono" style={{fontSize:13}}>{fe(cur)}</div></div>
          <div><div className="lbl">Snapshots</div><div className="mono" style={{fontSize:13}}>{snapshots.length}</div></div>
        </div>
      </div>

      <div className="card">
        <div className="cd-ti"><h3>Contributions P&amp;L</h3><span className="dim" style={{fontSize:10}}>tri meilleur → pire</span></div>
        {contribs.map(p=>(
          <div key={p.t} className="row" style={{gap:6,alignItems:"center"}}>
            <div style={{flex:"0 0 28%"}}>
              <div className="tk" style={{fontSize:12}}>{p.t}</div>
              <div className="dim" style={{fontSize:9}}>{fp(p.wt,0)} du portef.</div>
            </div>
            <div style={{flex:1}}>
              <div className="bar">
                <span style={{width:Math.abs(p.pnl)/maxAbsPnl*100+"%",background:p.pnl>=0?"#2ecc8f":"#e85d5d"}}/>
              </div>
            </div>
            <div className="num" style={{flex:"0 0 64px",color:cl(p.pnl),fontSize:11}}>{fe(p.pnl)}</div>
            <div className="num" style={{flex:"0 0 44px",fontSize:10,color:cl(p.pct)}}>{fp(p.pct,0)}</div>
          </div>
        ))}
      </div>

      {/* BENCHMARK vs SPY */}
      {(() => {
        const hb = calcHistBenchmark(port, qHistMap, spyHist, eurusd);
        const rows = hb ? hb.filter(r=>r.avail) : [];
        if(rows.length===0) return (
          <div className="warn">📊 Benchmark vs SPY en cours de chargement (historique Yahoo hebdomadaire) — réessaie dans quelques secondes.</div>
        );
        const last = rows[rows.length-1];
        return (
          <div className="card">
            <div className="cd-ti"><h3>Benchmark vs S&P 500</h3>
              <span className="num" style={{fontSize:11,color:cl(last.alpha)}}>Alpha {last.label} {last.alpha>=0?"+":""}{last.alpha}%</span>
            </div>
            <div className="dim" style={{fontSize:9,marginBottom:8,lineHeight:1.4}}>Panier actuel rejoué sur l'historique réel (composition constante, effet de change neutralisé). Indépendant des snapshots.</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>
                <tr style={{color:"#3a4560",fontSize:9,letterSpacing:".04em"}}>
                  <th style={{textAlign:"left",padding:"4px 6px"}}>HORIZON</th>
                  <th style={{textAlign:"right",padding:"4px 6px"}}>PORTEF.</th>
                  <th style={{textAlign:"right",padding:"4px 6px"}}>SPY</th>
                  <th style={{textAlign:"right",padding:"4px 6px"}}>ALPHA</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(r=>(
                  <tr key={r.key} style={{borderTop:"1px solid rgba(255,255,255,.04)"}}>
                    <td style={{padding:"5px 6px",color:"#8892a8"}}>{r.label}</td>
                    <td style={{padding:"5px 6px",textAlign:"right",fontFamily:"monospace",color:cl(r.portRet)}}>{fp(r.portRet,1)}</td>
                    <td style={{padding:"5px 6px",textAlign:"right",fontFamily:"monospace",color:cl(r.spyRet)}}>{fp(r.spyRet,1)}</td>
                    <td style={{padding:"5px 6px",textAlign:"right",fontFamily:"monospace",fontWeight:800,color:cl(r.alpha)}}>{r.alpha>=0?"+":""}{r.alpha}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      })()}

      {/* CORRÉLATIONS */}
      {(() => {
        const hc = calcHistCorrelations(port, qHistMap);
        if(!hc) return (
          <div className="warn">🔗 Corrélations en cours de chargement (historique Yahoo hebdomadaire).</div>
        );
        const tks = hc.tickers.slice(0,6);
        const corr = hc.mat;
        return (
          <div className="card">
            <div className="cd-ti"><h3>Corrélations inter-positions</h3><span className="dim" style={{fontSize:9}}>{hc.weeks} semaines réelles</span></div>

            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",fontSize:9,width:"100%"}}>
                <thead>
                  <tr>
                    <th style={{padding:"3px 6px",color:"#3a4560",textAlign:"left"}}/>
                    {tks.map(t=><th key={t} style={{padding:"3px 6px",color:"#8892a8",textAlign:"center"}}>{t}</th>)}

                <tbody>
                  {tks.map(ti=>(
                    <tr key={ti}>
                      <td style={{padding:"3px 6px",color:"#8892a8",fontWeight:700}}>{ti}</td>

                        const v=corr[ti][tj];

      <div className="dim" style={{fontSize:9,textAlign:"center",marginBottom:8}}>

    </>
  );

function WatchlistView({ port, m }) {
  const [watchList, setWatchList] = useState(loadWatch);
  const [watchPrices, setWatchPrices] = useState({});
  const [watchLoading, setWatchLoading] = useState(false);
  const [addTk, setAddTk] = useState("");
  const [simTk, setSimTk] = useState(OPPS[0] ? OPPS[0].t : "");
  const [simQty, setSimQty] = useState("");
  const [simPx, setSimPx] = useState("");
  const [simHz, setSimHz] = useState(12);
  const [simRes, setSimRes] = useState(null);

  const fetchWatchPrices = async () => {
    setWatchLoading(true);
    const r = {};
    await Promise.all(watchList.map(async tk => { try { r[tk] = await fetchSymbol(tk); } catch(e){} }));
    setWatchPrices(prev=>({...prev,...r})); setWatchLoading(false);
  };

  useEffect(() => { if(watchList.length>0) fetchWatchPrices(); }, []);

  const addWatch = () => {
    const t = addTk.toUpperCase().trim(); if(!t||watchList.includes(t)) return;
    const next=[...watchList,t]; setWatchList(next); saveWatch(next); setAddTk("");
  };
  const removeWatch = t => { const next=watchList.filter(x=>x!==t); setWatchList(next); saveWatch(next); };

  const simulate = () => {
    const qty=parseFloat(simQty), px=parseFloat(simPx);
    if(!simTk||!qty||!(px>0)) return;
    const T=simTk.toUpperCase();
    const newVal=qty*px, newTot=m.tot+newVal;
    const curHHI=port.filter(p=>p.val).reduce((s,p)=>s+Math.pow(p.val/m.tot,2),0);
    const newHHI=[...port.filter(p=>p.val).map(p=>p.val),newVal].reduce((s,v)=>s+Math.pow(v/newTot,2),0);
    const opp=OPPS.find(o=>o.t===T)||{s:"Autre"};
    const curSec=port.filter(p=>p.s===opp.s).reduce((s,p)=>s+(p.val||0),0);
    const newVolEst=Math.sqrt(Math.pow(m.wv*m.tot/newTot,2)+Math.pow(35*newVal/newTot,2));
    // Base pour la projection future du cours simulé (le détail du cône est recalculé selon l'horizon dans le rendu)
    const proj12 = opp.p!=null ? opp.p : null;           // rendement 12M attendu (%) de l'opportunité
    const conv = opp.c!=null ? opp.c : 60;               // conviction → resserre le cône
    setSimRes({ newVal, newTot, curHHI, newHHI, sec:opp.s, newSecPct:(curSec+newVal)/newTot*100,
      newWt:newVal/newTot*100, curVol:m.wv, newVolEst,
      ticker:T, px, qty, proj12, conv, tgt:opp.tgt, name:opp.n||T, hasProj:proj12!=null,
      totBefore:m.tot });
  };

  return (
    <>
      <div className="card">
        <div className="cd-ti"><h3>Watchlist</h3>
          <button className="bn bn-b ic-only" onClick={fetchWatchPrices}>{watchLoading?"…":"↻"}</button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          <input placeholder="Ajouter un ticker…" value={addTk} onChange={e=>setAddTk(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addWatch()} style={{flex:1}}/>
          <button className="bn bn-g" onClick={addWatch} style={{flex:"0 0 auto",padding:"6px 14px",borderRadius:6}}>+</button>
        </div>
        {watchList.map(tk=>{
          const o=OPPS.find(x=>x.t===tk), px=watchPrices[tk];
          return (
            <div key={tk} className="row">
              <div style={{flex:1}}>
                <div><span className="tk">{tk}</span> {o&&<span className="chip buy" style={{marginLeft:4}}>watch</span>}</div>
                <div className="nm">{o?.n||"—"}{o&&<span style={{color:"#3a4560"}}> • {o.s}</span>}</div>
              </div>
              <div className="num" style={{textAlign:"right",minWidth:90}}>
                <div style={{fontSize:13,fontWeight:700}}>{px?"$"+px.toFixed(2):"—"}</div>
                {o&&<div style={{fontSize:10,color:"#2ecc8f"}}>{fp(o.p,0)} 12M</div>}
              </div>
              <button style={{marginLeft:8,color:"#e85d5d",fontSize:14,padding:"4px 6px",cursor:"pointer"}} onClick={()=>removeWatch(tk)}>✕</button>
            </div>
          );
        })}
      </div>
      {watchList.length > 0 && (
        <div className="card">
          <div className="cd-ti"><h3>Analyse opportunités</h3></div>
          {watchList.map(tk => {
            const o = OPPS.find(x=>x.t===tk);
            if (!o) return <div key={tk} className="row"><span className="tk">{tk}</span><span className="dim" style={{fontSize:11}}>Pas de données analyste</span></div>;
            return (
              <div key={tk} style={{padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <div><span className="tk">{o.t}</span> <span className="dim" style={{fontSize:11}}>{o.n}</span></div>
                  <span className="tag" style={{color:"#2ecc8f",background:"rgba(46,204,143,.1)"}}>Conv. {o.c}/100</span>
                </div>
                <div style={{fontSize:11,color:"#8892a8",marginBottom:4,lineHeight:1.4}}>{o.note}</div>
                <div style={{fontSize:10,color:"#4f83f5",fontStyle:"italic",marginBottom:4}}><strong>Edge :</strong> {o.edg}</div>
                <div style={{display:"flex",gap:12,fontSize:10}}>
                  <span>Cible 12M : <strong style={{color:"#2ecc8f"}}>{fp(o.p,0)}</strong></span>
                  <span>Objectif : <strong>${o.tgt}</strong></span>
                </div>
              </div>
            );
          })}
        </div>
      )}
      <div className="card">
        <div className="cd-ti"><h3>Simulateur d'achat</h3></div>
        <div className="dim" style={{fontSize:11,marginBottom:8}}>Impact d'une nouvelle position sur le portefeuille ({fe(m.tot)}).</div>
        <div className="g3" style={{marginBottom:8}}>
          <div><div className="lbl">Ticker</div>
            <input value={simTk} onChange={e=>setSimTk(e.target.value.toUpperCase())} placeholder="Ex: CEG"/>
          </div>
          <div><div className="lbl">Quantité</div><input type="number" step="0.01" value={simQty} onChange={e=>setSimQty(e.target.value)}/></div>
          <div><div className="lbl">Prix (€/$)</div><input type="number" step="0.01" value={simPx} onChange={e=>setSimPx(e.target.value)}/></div>
        </div>
        <button className="bn bn-b" style={{width:"100%"}} onClick={simulate}>Simuler l'impact</button>
        {simRes && (() => {
          // Projection du cours simulé recalculée selon l'horizon choisi
          const hf = simHz/12;
          const annVol = Math.max(0.18, 0.50 - 0.25*(simRes.conv/100)); // + de conviction = cône + resserré
          const sigH = annVol*Math.sqrt(hf);
          const muH = simRes.hasProj ? (simRes.proj12/100)*hf : null;
          const cone = muH!=null ? { p10:(muH-1.28*sigH), p50:muH, p90:(muH+1.28*sigH) } : null;
          const A = simRes.newVal;
          const projMax = cone ? Math.max(Math.abs(cone.p10),Math.abs(cone.p90)) : 1;
          return (
          <div style={{marginTop:10}}>
            {/* Impact immédiat sur le portefeuille */}
            <div style={{background:"rgba(79,131,245,.06)",borderRadius:8,padding:10,marginBottom:8}}>
              <div className="lbl" style={{marginBottom:6,color:"#4f83f5"}}>Impact aujourd'hui sur ton portefeuille</div>
              <div className="row"><span>Valeur du portefeuille</span>
                <span className="mono">{fe(simRes.totBefore)} → <strong style={{color:"#4f83f5"}}>{fe(simRes.newTot)}</strong></span>
              </div>
              <div className="row"><span>Montant investi</span><span className="mono" style={{color:"#4f83f5",fontWeight:700}}>{fe(simRes.newVal)}</span></div>
              <div className="row"><span>Poids de la position</span><span className="mono">{fp(simRes.newWt,1)}</span></div>
              <div className="row"><span>Secteur {simRes.sec}</span><span className="mono">{fp(simRes.newSecPct,1)}</span></div>
              <div className="row"><span>Concentration (HHI)</span>
                <span className="mono">{simRes.curHHI.toFixed(3)} → <strong style={{color:simRes.newHHI<simRes.curHHI?"#2ecc8f":"#e85d5d"}}>{simRes.newHHI.toFixed(3)}</strong> {simRes.newHHI<simRes.curHHI?"↓ mieux":"↑"}</span>
              </div>
              <div className="row"><span>Volatilité portef.</span>
                <span className="mono">{simRes.curVol.toFixed(1)}% → <strong style={{color:simRes.newVolEst<simRes.curVol?"#2ecc8f":"#e85d5d"}}>{simRes.newVolEst.toFixed(1)}%</strong></span>
              </div>
              <div style={{fontSize:9,color:"#3a4560",marginTop:4}}>↓ HHI = mieux diversifié • idéal pour {port.length+1} positions ≈ {(1/(port.length+1)).toFixed(3)}</div>
            </div>

            {/* Projection future du cours simulé */}
            {cone ? (
              <div style={{background:"rgba(46,204,143,.05)",border:"1px solid rgba(46,204,143,.15)",borderRadius:8,padding:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div className="lbl" style={{color:"#2ecc8f"}}>Projection du cours · {simRes.ticker}</div>
                  <div className="seg" style={{margin:0}}>
                    {[3,6,12].map(hz=><div key={hz} className={"it"+(simHz===hz?" ac":"")} onClick={()=>setSimHz(hz)}>{hz}M</div>)}
                  </div>
                </div>
                <div style={{fontSize:10,color:"#8892a8",marginBottom:8,lineHeight:1.4}}>
                  Ce que deviendraient tes <strong>{fe(A)}</strong> investis dans {simRes.ticker} à {simHz} mois, selon 3 scénarios :
                </div>
                {[["P90 · optimiste",cone.p90,"#2ecc8f"],["P50 · médian",cone.p50,"#4f83f5"],["P10 · pessimiste",cone.p10,"#e85d5d"]].map(([lbl,r,col])=>(
                  <div key={lbl} style={{marginBottom:7}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}>
                      <span style={{color:col}}>{lbl}</span>
                      <span className="mono"><strong style={{color:col}}>{fe(A*(1+r))}</strong> <span style={{color:"#8892a8"}}>({fp(r*100,0)})</span></span>
                    </div>
                    <div style={{height:5,background:"rgba(255,255,255,.05)",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:(Math.abs(r)/projMax*50+2)+"%",marginLeft:r<0?(50-Math.abs(r)/projMax*50)+"%":"50%",background:col,borderRadius:3}}/>
                    </div>
                  </div>
                ))}
                <div style={{fontSize:9,color:"#3a4560",marginTop:6,lineHeight:1.4}}>
                  Ancré sur la conviction analyste ({simRes.conv}/100, cible ${simRes.tgt}). Cône élargi par la volatilité : plus l'horizon est long, plus l'incertitude grandit. Le P50 reste la trajectoire la plus probable.
                </div>
              </div>
            ) : (
              <div style={{background:"rgba(240,160,32,.06)",border:"1px solid rgba(240,160,32,.2)",borderRadius:8,padding:10,fontSize:10,color:"#8892a8",lineHeight:1.5}}>
                Projection de cours indisponible pour <strong>{simRes.ticker}</strong> : ce ticker n'est pas dans la liste d'opportunités analyste. L'impact portefeuille ci-dessus reste valable. Ajoute-le à la watchlist pour une projection.
              </div>
            )}
          </div>
          );
        })()}
      </div>
    </>
  );
}

function AnalysisView({ port, onSelect }) {
  return (
    <>
      <div className="dim" style={{fontSize:10,marginBottom:8,fontStyle:"italic"}}>
        La conviction de base est un jugement qualitatif de l'analyste, pas un score statistique. La valeur affichée est ajustée automatiquement (décroissance + cohérence momentum).
      </div>
      {port.map(p => {
        const a = AN[p.t]; if (!a) return null;
        const ec = p.dynConv ? p.dynConv.value : a.c;
        return (
          <div key={p.t} className="card tap" onClick={()=>onSelect(p.t)} style={{cursor:"pointer"}}>
            <div className="cd-ti">
              <h3 style={{color:"#dde3f0",fontSize:14,letterSpacing:0,textTransform:"none"}}>{p.t} — {p.n}</h3>
              <span className={"chip "+a.sig}>{a.r}</span>
            </div>
            <div className="dim" style={{fontSize:11,lineHeight:1.5}}>{a.th.length>180?a.th.slice(0,180)+"…":a.th}</div>
            <div className="g2" style={{marginTop:8}}>
              <div><div className="lbl">Conviction {ec!==a.c?"(ajustée)":""}</div>
                <div className="bar"><span style={{width:ec+"%",background:cv(ec)}}/></div>
                <div className="num" style={{fontSize:11,marginTop:3,color:cv(ec)}}>{ec}/100{ec!==a.c?` (base ${a.c})`:""}</div>
              </div>
              <div><div className="lbl">Cible 12M</div>
                <div className="num" style={{fontSize:14,color:cl(a.p)}}>{fp(a.p,0)}</div>

          </div>
        );

    </>
  );
}

function ScenariosView({ port, m }) {
  const [horizon, setHorizon] = useState(12);
  const [sInfo, setSInfo] = useState(false);
  const [activeStress, setActiveStress] = useState(null);
  const [macroCtx, setMacroCtx] = useState(() => loadMacroCtx() || {});
  const [ctxLoading, setCtxLoading] = useState(false);
  const h = horizon / 12;

  // Charger / rafraîchir le contexte macro
  const refreshCtx = async () => {
    setCtxLoading(true);
    const ctx = await fetchMacroCtx();
    setMacroCtx(ctx);
    setCtxLoading(false);
  };

  useEffect(() => {
    if(!macroCtx || Object.keys(macroCtx).length === 0) refreshCtx();
  }, []);

  const handleStressClick = (sc) => {
    setActiveStress(activeStress === sc.id ? null : sc.id);
  };

  const stressResult = useMemo(() => {
    if(!activeStress) return null;
    return computeDynShocks(activeStress, macroCtx);
  }, [activeStress, macroCtx, port]);

  const items = port.map(p => {
    if (p.val == null) return null;
    const f = forecast(p, MACRO);
    return {
      t: p.t,
      val: p.val,
      p10: p.val * (1 + f.p10 * h),
      p50: p.val * (1 + f.p50 * h),
      p90: p.val * (1 + f.p90 * h)
    };
  }).filter(Boolean);
  const tot10 = items.reduce((s,x)=>s+x.p10,0);
  const tot50 = items.reduce((s,x)=>s+x.p50,0);
  const tot90 = items.reduce((s,x)=>s+x.p90,0);

  // Calcul impacts portefeuille avec chocs dynamiques (sectoriel + change EUR/USD)
  const stressImpact = useMemo(() => {
    if(!stressResult) return null;
    const fx = stressResult.fxShock || 0;
    const items = port.filter(p => p.val != null).map(p => {
      const sectorShock = stressResult.shocks[p.s] || 0;
      const isUSD = !YF[p.t] || YF[p.t].ccy !== "EUR";
      const fxFactor = (isUSD && fx !== 0) ? (1/(1+fx)) : 1;
      const totalMult = (1+sectorShock) * fxFactor;
      return { t:p.t, val:p.val, s:p.s, shockPct:(totalMult-1)*100, after:p.val*totalMult, fxApplied: isUSD && fx!==0 };
    });
    const totB = items.reduce((s,x)=>s+x.val, 0);
    const totA = items.reduce((s,x)=>s+x.after, 0);
    const top3 = [...items].sort((a,b)=>Math.abs(b.shockPct)-Math.abs(a.shockPct)).slice(0,3);
    return { items, totB, totA, delta:totA-totB, deltaPct:(totA-totB)/totB*100, top3 };
  }, [stressResult, port]);

  return (
    <>
      <div className="card">
        <div className="cd-ti">
          <h3>Stress-tests dynamiques</h3>
          <button className="bn bn-b ic-only" onClick={refreshCtx} title="Actualiser le contexte marché">
            {ctxLoading ? "…" : "↻"}
          </button>
        </div>
        {/* Contexte marché */}
        {Object.keys(macroCtx).length > 0 ? (
          <>
          <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
            {[["QQQ","qqq","qqqPct"],["TLT","tlt","tltPct"],["ITA","ita","itaPct"],["GLD","gld","gldPct"]].map(([lbl,k,pk])=>{
              if(!macroCtx[k]) return null;
              const pct = macroCtx[pk];
              const hot = pct!=null && pct>0.70;
              return (
                <span key={k} style={{background:"rgba(79,131,245,.1)",border:"1px solid rgba(79,131,245,.2)",borderRadius:5,padding:"3px 8px",fontSize:10,color:"#8892a8"}}>
                  {lbl} <strong style={{color:hot?"#f0a020":"#dde3f0"}}>${macroCtx[k].toFixed(0)}</strong>
                  {pct!=null && <span style={{color:hot?"#f0a020":"#3a4560",marginLeft:4}}>{Math.round(pct*100)}ᵉ centile</span>}
                </span>
              );
            })}
          </div>
          <div style={{fontSize:9,color:"#3a4560",marginBottom:10,lineHeight:1.4}}>
            « ᵉ centile » = position du cours dans sa fourchette des 3 dernières années (100 = plus haut, 0 = plus bas). C'est cette position, et non un seuil fixe, qui calibre l'intensité des scénarios — elle s'actualise donc toute seule avec le marché.
          </div>
          </>
        ) : (
          <div className="dim" style={{fontSize:10,marginBottom:8}}>{ctxLoading ? "⌛ Chargement contexte marché…" : "Contexte non chargé — appuie sur ↻"}</div>
        )}
        {/* Boutons scénarios */}
        <div className="g3" style={{marginBottom:stressImpact?10:0}}>
          {STRESS_SCENARIOS.map(sc=>(
            <button key={sc.id} onClick={()=>handleStressClick(sc)}
              style={{background:activeStress===sc.id?"rgba(79,131,245,.25)":"#161c2a",border:activeStress===sc.id?"1px solid #4f83f5":"1px solid rgba(255,255,255,.06)",borderRadius:8,padding:"8px 6px",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:18,marginBottom:2}}>{sc.emoji}</div>
              <div style={{fontSize:9,fontWeight:800,color:activeStress===sc.id?"#4f83f5":"#8892a8",letterSpacing:".03em",lineHeight:1.3}}>{sc.label}</div>
            </button>
          ))}
        </div>
        {/* Résultats */}
        {stressResult && stressImpact && (
          <>
            <div style={{fontSize:11,color:"#8892a8",marginBottom:8,lineHeight:1.4}}>{stressResult.desc}</div>
            {/* PÉDAGOGIE — la chaîne économique, étape par étape */}
            {stressResult.chain && stressResult.chain.length > 0 && (
              <div style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                <div className="lbl" style={{marginBottom:6}}>Pourquoi · le raisonnement économique</div>
                {stressResult.chain.map((step,i)=>(
                  <div key={i} style={{display:"flex",gap:8,marginBottom:i<stressResult.chain.length-1?7:0}}>
                    <div style={{flex:"0 0 18px",height:18,borderRadius:9,background:"rgba(79,131,245,.15)",color:"#4f83f5",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</div>
                    <div style={{flex:1,fontSize:11,color:"#dde3f0",lineHeight:1.45}}>{step}</div>
                  </div>
                ))}
              </div>
            )}
            {/* Calibrage marché en direct (percentiles) + effet devise */}
            {stressResult.notes.length > 0 && (
              <div style={{background:"rgba(79,131,245,.06)",borderRadius:6,padding:"8px 10px",marginBottom:8}}>
                <div className="lbl" style={{marginBottom:5,color:"#4f83f5"}}>Calibrage selon le marché actuel</div>
                {stressResult.notes.map((n,i)=>(
                  <div key={i} style={{fontSize:10,color:"#8892a8",marginBottom:i<stressResult.notes.length-1?5:0,lineHeight:1.4}}>{n}</div>
                ))}
              </div>
            )}
            {/* Impact concret sur TON portefeuille */}
            {stressResult.pf && (
              <div style={{background:"rgba(240,160,32,.06)",border:"1px solid rgba(240,160,32,.2)",borderRadius:8,padding:"9px 12px",marginBottom:10}}>
                <div className="lbl" style={{marginBottom:4,color:"#f0a020"}}>Ce que ça change pour toi</div>
                <div style={{fontSize:11,color:"#dde3f0",lineHeight:1.5}}>{stressResult.pf}</div>
              </div>
            )}
            <div className="g2" style={{marginBottom:8}}>
              <div style={{background:"#161c2a",borderRadius:6,padding:"8px 10px"}}>
                <div className="lbl">Valeur AVANT</div>
                <div className="mono" style={{fontSize:16}}>{fe(stressImpact.totB)}</div>
              </div>
              <div style={{background:stressImpact.deltaPct>=0?"rgba(46,204,143,.08)":"rgba(232,93,93,.08)",borderRadius:6,padding:"8px 10px",border:"1px solid "+(stressImpact.deltaPct>=0?"rgba(46,204,143,.3)":"rgba(232,93,93,.3)")}}>
                <div className="lbl">Valeur APRÈS</div>
                <div className="mono" style={{fontSize:16,color:stressImpact.deltaPct>=0?"#2ecc8f":"#e85d5d"}}>{fe(stressImpact.totA)}</div>
                <div style={{fontSize:10,color:stressImpact.deltaPct>=0?"#2ecc8f":"#e85d5d"}}>{fp(stressImpact.deltaPct,1)} ({fe(stressImpact.delta)})</div>
              </div>
            </div>
            <div className="lbl" style={{marginBottom:4}}>Top 3 positions exposées</div>
            {stressImpact.top3.map(x=>(
              <div key={x.t} className="row" style={{padding:"6px 0"}}>
                <div style={{flex:"0 0 25%"}} className="tk">{x.t}</div>
                <div style={{flex:1,textAlign:"right",paddingRight:8}} className="dim">{x.s}</div>
                <div style={{flex:"0 0 60px",textAlign:"right",fontWeight:700,color:x.shockPct>=0?"#2ecc8f":"#e85d5d",fontFamily:"monospace"}}>{fp(x.shockPct,0)}</div>
                <div style={{flex:"0 0 70px",textAlign:"right",fontFamily:"monospace",fontSize:11}}>{fe(x.after-x.val)}</div>
              </div>
            ))}
            {!stressResult.dynamic && <div style={{fontSize:9,color:"#3a4560",marginTop:6}}>Données statiques — appuie sur ↻ pour calibrer avec le marché</div>}
          </>
        )}
      </div>
      <div className="warn">
        ℹ️ <strong>Estimation probabiliste, pas une certitude.</strong> Le moteur 10 facteurs combine convictions analyste, momentum, volatilité. Les bandes P10/P50/P90 reflètent l'incertitude — pas un objectif.
      </div>
      <div className="card">
        <div className="cd-ti"><h3>Horizon</h3></div>
        <div className="seg">
          {[3,6,9,12].map(n =>
            <div key={n} className={"it"+(horizon===n?" ac":"")} onClick={()=>setHorizon(n)}>{n}M</div>
          )}
        </div>
      </div>
      <div className="g3">
        <div className="card" style={{textAlign:"center"}}>
          <div className="lbl">P10 (pessimiste)</div>
          <div className="mono" style={{fontSize:18,color:"#e85d5d"}}>{fe(tot10)}</div>
          <div className="num" style={{fontSize:11,color:"#e85d5d"}}>{fp((tot10/m.tot-1)*100,0)}</div>
        </div>
        <div className="card" style={{textAlign:"center"}}>
          <div className="lbl">P50 (médian)</div>
          <div className="mono" style={{fontSize:18,color:"#4f83f5"}}>{fe(tot50)}</div>
          <div className="num" style={{fontSize:11,color:"#4f83f5"}}>{fp((tot50/m.tot-1)*100,0)}</div>
        </div>
        <div className="card" style={{textAlign:"center"}}>
          <div className="lbl">P90 (optimiste)</div>
          <div className="mono" style={{fontSize:18,color:"#2ecc8f"}}>{fe(tot90)}</div>
          <div className="num" style={{fontSize:11,color:"#2ecc8f"}}>{fp((tot90/m.tot-1)*100,0)}</div>
        </div>
      </div>
      {/* PÉDAGOGIE — comprendre les 3 scénarios futurs (replié derrière un i) */}
      <div className="card">
        <div className="cd-ti" style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}} onClick={()=>setSInfo(v=>!v)}>
          <h3>Comment lire ces 3 scénarios ?</h3>
          <span style={{width:16,height:16,borderRadius:8,border:"1px solid",color:sInfo?"#4f83f5":"#8892a8",borderColor:sInfo?"#4f83f5":"#3a4560",
            fontSize:10,fontWeight:800,display:"inline-flex",alignItems:"center",justifyContent:"center",fontStyle:"italic",fontFamily:"Georgia,serif",flex:"0 0 auto"}}>{sInfo?"×":"i"}</span>
        </div>
        {!sInfo && <div style={{fontSize:10,color:"#3a4560",marginTop:2}}>Touche le « i » pour l'explication (P10 / P50 / P90, raisonnement, impact portefeuille).</div>}
        {sInfo && <>
        <div style={{fontSize:11,color:"#dde3f0",lineHeight:1.55,margin:"8px 0 10px"}}>
          Plutôt qu'un seul chiffre faussement précis, le moteur dessine <strong>trois avenirs possibles</strong> à {horizon} mois. La réalité tombera presque toujours entre les deux extrêmes.
        </div>
        <div style={{marginBottom:8}}>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <div style={{flex:"0 0 4px",background:"#e85d5d",borderRadius:2}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:"#e85d5d"}}>P10 · le scénario pessimiste</div>
              <div style={{fontSize:10,color:"#8892a8",lineHeight:1.45}}>Si les vents tournent mal (récession, choc géopolitique, dégonflement des valorisations). Il n'y a qu'environ 1 chance sur 10 de faire pire. C'est ta zone de résistance à surveiller.</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <div style={{flex:"0 0 4px",background:"#4f83f5",borderRadius:2}}/>

function EarningsCalendar({ port, onSelect }) {
  const [dates, setDates] = useState({});

  useEffect(() => {
    let alive = true;
    port.forEach(p => {
      const sym = YF[p.t] ? YF[p.t].y : p.t;
      fetchEarningsDate(sym).then(d => { if(alive) setDates(prev => ({ ...prev, [p.t]: d })); });
    });
    return () => { alive = false; };
  }, [tickerKey]);
  const now = Date.now();
  const upcoming = port
    .map(p => ({ p, e: dates[p.t] }))
    .filter(x => x.e && x.e.ts >= now - 2*86400000)
    .sort((a,b) => a.e.ts - b.e.ts);
  const loading = port.some(p => dates[p.t] === undefined);
  return (
    <div className="card">
      <div className="cd-ti"><h3>Prochains résultats</h3>
        {upcoming.length>0 && <span className="dim" style={{fontSize:10}}>{upcoming.length} à venir</span>}

        <div className="dim" style={{fontSize:11}}>{loading ? "Chargement des dates de publication…" : "Aucune date de résultats connue pour le moment."}</div>
      ) : upcoming.map(({p,e}) => {
        const days = Math.round((e.ts - now)/86400000);
        const soon = days <= 14;
        return (
          <div key={p.t} className="row" onClick={()=>onSelect&&onSelect(p.t)}
            style={{cursor:"pointer",padding:"7px 0",borderTop:"1px solid rgba(255,255,255,.04)"}}>

      })}

  );
}

// MÉMOIRE — le passé : historique de valeur, P&L, contributions, fiabilité du moteur
function MemoryView({ snapshots, port, m, eurusd, qHistMap, spyHist }) {
  const precision = useMemo(()=>calcMotorPrecision(snapshots),[snapshots]);
  const [backtest, setBacktest] = useState(null);
  useEffect(() => {
    snapshotsRange(Date.now() - 100*86400000).then(arr => {
      if (arr.length === 0) { setBacktest({ available:false }); return; }
      const target = Date.now() - 90*86400000;
      const closest = arr.reduce((a,b) => Math.abs(b.ts-target)<Math.abs(a.ts-target)?b:a);
      const ageDays = Math.round((Date.now() - closest.ts)/86400000);
      if (ageDays < 60) { setBacktest({ available:false, ageDays }); return; }
      const realPct = closest.tot > 0 ? ((m.tot - closest.tot)/closest.tot)*100 : 0;
      const predPct = (closest.pred3M || 0);
      setBacktest({ available:true, ageDays, realPct, predPct, gap: realPct - predPct });
    });
  }, [m.tot]);

  return (
    <>
      <HistoryView snapshots={snapshots} port={port} eurusd={eurusd} qHistMap={qHistMap} spyHist={spyHist}/>
      {precision ? (
        <div className="card">
          <div className="cd-ti"><h3>Précision moteur</h3><span className="dim" style={{fontSize:9}}>{precision.count} mesures</span></div>

/* ============== CODE DE VERROUILLAGE ============== */
/* ===== BIOMÉTRIE (WebAuthn) — empreinte digitale Android/Samsung =====
   Chrome Android relie WebAuthn au capteur d'empreinte du téléphone.
   Exige HTTPS (GitHub Pages convient). Le PIN reste le secours obligatoire :
   sans lui, un changement d'appareil ou un capteur indisponible = blocage total. */
const BIO_KEY = "fab-bio-cred";
function getBioCred(){ try { return localStorage.getItem(BIO_KEY)||""; } catch(e){ return ""; } }
function setBioCred(v){ try { if(v) localStorage.setItem(BIO_KEY,v); else localStorage.removeItem(BIO_KEY); } catch(e){} }
const b64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
const unb64url = s => { s = s.replace(/-/g,"+").replace(/_/g,"/"); const bin = atob(s); const a = new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a; };

// Le capteur est-il disponible sur cet appareil ?
async function bioAvailable(){
  try {
    if(!window.PublicKeyCredential || !navigator.credentials) return false;
    if(!window.isSecureContext) return false;                       // HTTPS obligatoire
    return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  } catch(e){ return false; }
}

// Enrôlement : associe l'empreinte de CET appareil à l'application
async function bioEnroll(){
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const userId = crypto.getRandomValues(new Uint8Array(16));
  const cred = await navigator.credentials.create({ publicKey: {
    challenge,
    rp: { name: "port.folio Fab" },                                  // domaine courant par défaut
    user: { id: userId, name: "fab", displayName: "port.folio Fab" },
    pubKeyCredParams: [{ type:"public-key", alg:-7 }, { type:"public-key", alg:-257 }],
    authenticatorSelection: { authenticatorAttachment:"platform", userVerification:"required", residentKey:"preferred" },
    timeout: 60000, attestation: "none"
  }});
  if(!cred) throw new Error("Enrôlement annulé");
  setBioCred(b64url(cred.rawId));
  return true;
}

// Déverrouillage : déclenche l'invite d'empreinte
async function bioVerify(){
  const id = getBioCred();
  if(!id) throw new Error("Aucune empreinte enregistrée");
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const assertion = await navigator.credentials.get({ publicKey: {
    challenge,
    allowCredentials: [{ type:"public-key", id: unb64url(id) }],
    userVerification: "required", timeout: 60000
  }});
  return Boolean(assertion);
}

const PIN_KEY = "fab-pin";
function getPinHash() { try { return localStorage.getItem(PIN_KEY)||""; } catch(e){ return ""; } }
function setPinHash(h) { try { if(h) localStorage.setItem(PIN_KEY,h); else localStorage.removeItem(PIN_KEY); } catch(e){} }
function hashPin(p) {
  let h = 0;
  for(let i=0;i<p.length;i++){ h=((h<<5)-h)+p.charCodeAt(i); h|=0; }
  return btoa(Math.abs(h).toString(36)+"pfv2026");
}

  const tryBio = useCallback(async () => {
    if(!getBioCred()) { setBioState("none"); return; }
    setBioState("prompt");
    try { if(await bioVerify()) { onUnlock(); return; } setBioState("fail"); }
    catch(e){ setBioState("fail"); }
  }, [onUnlock]);

  useEffect(() => { if(!triedRef.current){ triedRef.current = true; tryBio(); } }, [tryBio]);

  const [dcaDate, setDcaDate] = useState(new Date().toISOString().slice(0,10));
  const [dcaHistory, setDcaHistory] = useState(loadDCA);

  const addDCA = () => {
    const t=dcaTicker.toUpperCase().trim();
    if(!t||!dcaQty||!dcaPrice) return;
    const h={...dcaHistory,[t]:[...(dcaHistory[t]||[]),{date:dcaDate,qty:+dcaQty,price:+dcaPrice}]};
    setDcaHistory(h); saveDCA(h); setDcaQty(""); setDcaPrice("");
  };

  const delDCAEntry = (t, entry) => {
    let removed = false;
    const next = (dcaHistory[t]||[]).filter(x => {
      if (!removed && x.date===entry.date && x.qty===entry.qty && x.price===entry.price) { removed = true; return false; }
      return true;
    });
    const h = { ...dcaHistory };
    if (next.length) h[t] = next; else delete h[t];
    setDcaHistory(h); saveDCA(h);
  };

  const applyDCAtoPosition = (t, totQ, pru) => {
    if (!port.some(p => p.t === t)) {
      alert(t + " n'est pas dans le portefeuille. Ajoute d'abord la position ci-dessous.");
      return;
    }
    if (!confirm(`Remplacer le PRU et la quantité de ${t} par les valeurs DCA ?\nQté ${fnum(totQ,4)} · PRU ${fe(pru)}`)) return;
    onPortChange(port.map(p => p.t === t ? { ...p, q: totQ, b: pru } : p));
  };

  const removePos = (t) => {
    if (!confirm(`Supprimer ${t} du portefeuille ?`)) return;
    onPortChange(port.filter(p => p.t !== t));
  };
  const addPos = () => {
    if (!form.t || !form.q || !form.b) { alert("Ticker, quantité et PRU obligatoires"); return; }
    const exists = port.find(p => p.t === form.t.toUpperCase());
    if (exists) { alert("Ticker déjà présent — supprimer puis re-ajouter"); return; }
    onPortChange([...port, { ...form, t: form.t.toUpperCase(), q: +form.q, b: +form.b, v: +form.v }]);
    setForm({ t:"", n:"", q:"", b:"", s:"Tech", sig:"hold", v:25 });
  };

  // ===== Sauvegarde / restauration (confidentialité : données hors du code source) =====
  const fileRef = useRef(null);
  const exportPortfolio = () => {
    const data = { app:"port.folio Fab", type:"portfolio-backup", version:1,
      exportedAt:new Date().toISOString().slice(0,10), port };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});

    const a = document.createElement("a");
    a.href = url; a.download = "portfolio-fab-sauvegarde.json"; a.click();

  };
  const importPortfolio = (e) => {
